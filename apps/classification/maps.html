<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Maps — IRC Emergency Classification</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <style>
    .maps-layout {
      display: flex;
      min-height: calc(100vh - 180px);
      gap: 0;
    }
    .maps-sidebar {
      width: 280px;
      min-width: 280px;
      background: #fff;
      border-right: 1px solid #e5e5e5;
      padding: 20px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }
    .maps-main {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-width: 0;
    }
    .maps-title-bar {
      padding: 16px 24px;
      border-bottom: 1px solid #e5e5e5;
      background: #fff;
    }
    .maps-title {
      font-size: 1.25rem;
      font-weight: 600;
      color: #1a1a1a;
      margin: 0;
      cursor: pointer;
      padding: 4px 8px;
      border-radius: 6px;
      border: 1px solid transparent;
      transition: border-color 0.2s;
    }
    .maps-title:hover {
      border-color: #ddd;
    }
    .maps-title:focus {
      outline: none;
      border-color: #FFC72C;
      background: #FFFDF5;
    }
    .maps-title-hint {
      font-size: 0.75rem;
      color: #999;
      margin-top: 4px;
      padding-left: 8px;
    }
    #maps-container {
      flex: 1;
      min-height: 400px;
      background: #f0f0f0;
    }
    .maps-legend {
      padding: 12px 24px;
      background: #fff;
      border-top: 1px solid #e5e5e5;
      display: flex;
      align-items: center;
      gap: 16px;
      flex-wrap: wrap;
    }
    .legend-item {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 0.8rem;
      color: #555;
    }
    .legend-dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      border: 1px solid rgba(0,0,0,0.15);
    }
    .legend-gradient-bar {
      width: 200px;
      height: 14px;
      border-radius: 3px;
      border: 1px solid #ddd;
    }
    .legend-gradient-labels {
      display: flex;
      justify-content: space-between;
      width: 200px;
      font-size: 0.7rem;
      color: #888;
    }

    /* Sidebar filter styles */
    .filter-group {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .filter-label {
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: #888;
    }
    .pill-group {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }
    .filter-pill {
      padding: 5px 12px;
      border-radius: 20px;
      border: 1px solid #ddd;
      background: #fff;
      font-size: 0.8rem;
      cursor: pointer;
      transition: all 0.15s;
      color: #555;
      font-family: inherit;
    }
    .filter-pill:hover {
      border-color: #bbb;
      background: #f9f9f9;
    }
    .filter-pill.active {
      background: #1a1a1a;
      color: #fff;
      border-color: #1a1a1a;
    }
    .toggle-btn {
      padding: 5px 10px;
      border-radius: 6px;
      border: 1px solid #ddd;
      background: #fff;
      font-size: 0.78rem;
      cursor: pointer;
      transition: all 0.15s;
      color: #555;
      display: flex;
      align-items: center;
      gap: 5px;
      font-family: inherit;
    }
    .toggle-btn:hover {
      border-color: #bbb;
    }
    .toggle-btn.active {
      background: #f0f0f0;
      border-color: #999;
      color: #1a1a1a;
      font-weight: 500;
    }
    .toggle-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      border: 1px solid rgba(0,0,0,0.15);
    }
    .filter-select {
      padding: 6px 10px;
      border-radius: 6px;
      border: 1px solid #ddd;
      font-size: 0.8rem;
      font-family: inherit;
      background: #fff;
      color: #333;
      cursor: pointer;
    }
    .radio-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .radio-item {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.8rem;
      color: #555;
      cursor: pointer;
    }
    .radio-item input[type="radio"] {
      accent-color: #1a1a1a;
    }

    .sidebar-summary {
      font-size: 0.85rem;
      color: #666;
      padding: 8px 0;
      border-top: 1px solid #eee;
    }
    .sidebar-export {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .export-checkbox {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.8rem;
      color: #555;
      cursor: pointer;
    }
    .export-checkbox input {
      accent-color: #1a1a1a;
    }
    .export-btn {
      padding: 10px 16px;
      border-radius: 8px;
      border: none;
      background: #1a1a1a;
      color: #fff;
      font-size: 0.85rem;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s;
      font-family: inherit;
    }
    .export-btn:hover {
      background: #333;
    }
    .export-btn:disabled {
      background: #ccc;
      cursor: not-allowed;
    }

    /* Map tooltip styles (same as dashboard) */
    .map-country-tooltip {
      background: #fff;
      border: 1px solid #ddd;
      border-radius: 8px;
      padding: 8px 12px;
      font-size: 0.8rem;
      box-shadow: 0 2px 8px rgba(0,0,0,0.12);
      max-width: 220px;
    }
    .map-country-tooltip .leaflet-tooltip-content {
      margin: 0;
    }
    .map-tip-name {
      font-weight: 600;
      color: #1a1a1a;
      margin-bottom: 4px;
    }
    .map-tip-row {
      display: flex;
      align-items: center;
      gap: 6px;
      flex-wrap: wrap;
    }
    .map-tip-stance {
      display: inline-block;
      padding: 1px 8px;
      border-radius: 10px;
      font-size: 0.7rem;
      font-weight: 600;
    }
    .map-tip-type {
      width: 16px;
      height: 16px;
      display: inline-flex;
      color: #666;
    }
    .map-tip-type svg {
      width: 100%;
      height: 100%;
    }
    .map-tip-count {
      font-size: 0.7rem;
      color: #888;
      margin-top: 2px;
    }
    .map-popup-title {
      font-weight: 600;
      font-size: 0.95rem;
      margin-bottom: 6px;
    }
    .map-popup-stance {
      display: inline-block;
      padding: 2px 10px;
      border-radius: 10px;
      font-size: 0.75rem;
      font-weight: 600;
      margin-bottom: 4px;
    }
    .map-popup-detail {
      font-size: 0.78rem;
      color: #666;
      margin: 2px 0;
    }
    .map-popup-multi {
      border-top: 1px solid #eee;
      margin: 8px 0;
    }
    .map-popup-link {
      display: inline-block;
      margin-top: 4px;
      font-size: 0.75rem;
      color: #2563eb;
      text-decoration: none;
    }

    @media (max-width: 768px) {
      .maps-layout {
        flex-direction: column;
      }
      .maps-sidebar {
        width: 100%;
        min-width: 100%;
        border-right: none;
        border-bottom: 1px solid #e5e5e5;
        max-height: 320px;
        overflow-y: auto;
      }
      #maps-container {
        min-height: 400px;
      }
    }
  </style>
</head>
<body>
  <div id="header-mount"></div>
  <main>
    <div id="nav-mount"></div>
    <div class="maps-layout">
      <!-- Sidebar -->
      <div class="maps-sidebar">
        <!-- Time Period -->
        <div class="filter-group">
          <div class="filter-label">Time Period</div>
          <div class="pill-group" id="time-pills">
            <button class="filter-pill active" data-period="all">All time</button>
            <button class="filter-pill" data-period="fy" id="fy-pill">FY26</button>
            <button class="filter-pill" data-period="12m">Last 12 months</button>
          </div>
        </div>

        <!-- Emergency Type -->
        <div class="filter-group">
          <div class="filter-label">Emergency Type</div>
          <div class="pill-group" id="type-toggles">
            <button class="toggle-btn" data-type="conflict">Conflict</button>
            <button class="toggle-btn" data-type="outbreak">Outbreak</button>
            <button class="toggle-btn" data-type="food">Food</button>
            <button class="toggle-btn" data-type="hazard">Hazard</button>
            <button class="toggle-btn" data-type="complex">Complex</button>
          </div>
        </div>

        <!-- Stance -->
        <div class="filter-group">
          <div class="filter-label">Stance</div>
          <div class="pill-group" id="stance-toggles">
            <button class="toggle-btn" data-stance="red"><span class="toggle-dot" style="background:#E52911;"></span> Red</button>
            <button class="toggle-btn" data-stance="orange"><span class="toggle-dot" style="background:#F58220;"></span> Orange</button>
            <button class="toggle-btn" data-stance="yellow"><span class="toggle-dot" style="background:#FFC72C;"></span> Yellow</button>
            <button class="toggle-btn" data-stance="white"><span class="toggle-dot" style="background:#E9E9E9;"></span> White</button>
          </div>
        </div>

        <!-- Region -->
        <div class="filter-group">
          <div class="filter-label">Region</div>
          <select class="filter-select" id="region-select">
            <option value="all">All Regions</option>
            <option value="asia">Asia</option>
            <option value="east africa">East Africa</option>
            <option value="latam">LatAm</option>
            <option value="mena">MENA</option>
            <option value="rai">RAI</option>
            <option value="west and central africa">West & Central Africa</option>
          </select>
        </div>

        <!-- Display Mode -->
        <div class="filter-group">
          <div class="filter-label">Display Mode</div>
          <div class="radio-group">
            <label class="radio-item"><input type="radio" name="display-mode" value="stance" checked> Stance color</label>
            <label class="radio-item"><input type="radio" name="display-mode" value="severity"> Severity heatmap</label>
          </div>
        </div>

        <!-- Status -->
        <div class="filter-group">
          <div class="filter-label">Status</div>
          <div class="pill-group" id="status-pills">
            <button class="filter-pill active" data-status="active">Active only</button>
            <button class="filter-pill" data-status="all">All</button>
          </div>
        </div>

        <!-- Summary -->
        <div class="sidebar-summary" id="filter-summary">0 classifications shown</div>

        <!-- Export -->
        <div class="sidebar-export">
          <label class="export-checkbox">
            <input type="checkbox" id="branding-toggle" checked> IRC branding
          </label>
          <button class="export-btn" id="export-btn">Export PNG</button>
        </div>
      </div>

      <!-- Main map area -->
      <div class="maps-main">
        <div class="maps-title-bar">
          <h2 class="maps-title" id="map-title" contenteditable="true" spellcheck="false">Active Classifications</h2>
          <div class="maps-title-hint">Click to edit title</div>
        </div>
        <div id="maps-container"></div>
        <div class="maps-legend" id="maps-legend"></div>
      </div>
    </div>
  </main>
  <div id="footer-mount"></div>

  <script src="irc-shared.iife.js"></script>
  <script src="supabase.js"></script>
  <script src="shared.js"></script>
  <script>
    // Render shared chrome
    document.getElementById('header-mount').innerHTML = IRC.renderHeader('maps');
    document.getElementById('nav-mount').innerHTML = IRC.renderNav();
    document.getElementById('footer-mount').innerHTML = IRC.renderFooter();

    // ── State ──
    var classifications = IRC.getClassifications();
    var timePeriod = 'all';
    var statusFilter = 'active';
    var selectedTypes = [];    // empty = all
    var selectedStances = [];  // empty = all
    var regionFilter = 'all';
    var displayMode = 'stance';
    var titleEdited = false;

    // Fiscal year
    var now = new Date();
    var currentFY = now.getMonth() >= 9 ? now.getFullYear() + 1 : now.getFullYear();
    var fyLabel = 'FY' + String(currentFY).slice(-2);
    var fyStart = new Date(currentFY - 1, 9, 1);
    var fyEnd = new Date(currentFY, 8, 30, 23, 59, 59);
    document.getElementById('fy-pill').textContent = fyLabel;

    // ── Async load from Supabase ──
    IRC.db.migrateFromLocalStorage().then(function() {
      return IRC.db.load();
    }).then(function(data) {
      classifications = data;
      applyFilters();
    });

    // ── GEO alias maps ──
    var GEO_TO_CLASS = {
      'Republic of the Congo': 'Congo',
      'United Republic of Tanzania': 'Tanzania',
      'eSwatini': 'Eswatini',
      'Côte d\'Ivoire': 'Ivory Coast',
      'Republic of Serbia': 'Serbia',
      'The Bahamas': 'Bahamas',
      'Somaliland': 'Somalia',
      'Republic of Korea': 'South Korea',
      'Dem. Rep. Korea': 'North Korea',
      'Timor-Leste': 'East Timor',
      'Lao PDR': 'Laos',
      'Iran': 'Iran (Islamic Republic of)',
      'Syria': 'Syrian Arab Republic',
      'Palestine': 'State of Palestine',
      'Moldova': 'Moldova (Republic of)',
      'Venezuela': 'Venezuela (Bolivarian Republic of)',
      'Vietnam': 'Viet Nam',
      'Tanzania': 'United Republic of Tanzania',
      'Democratic Republic of the Congo': 'Democratic Republic of the Congo'
    };
    var CLASS_TO_GEO = {};
    Object.keys(GEO_TO_CLASS).forEach(function(k) { CLASS_TO_GEO[GEO_TO_CLASS[k]] = k; });

    // ── Type icons (same as dashboard) ──
    var typeIcons = {
      'conflict': '<svg viewBox="0 0 512 512" fill="currentColor" xmlns="http://www.w3.org/2000/svg"><path d="m58 308.5c-15.439 0-28 12.561-28 28 0 6.763 2.41 12.973 6.417 17.818.058.074 59.793 70.911 59.986 71.096 9.632 11.068 23.806 18.086 39.597 18.086h240c15.798 0 29.977-7.024 39.61-18.102.188-.181 59.915-71.007 59.973-71.081 4.007-4.844 6.417-11.054 6.417-17.817 0-15.439-12.561-28-28-28zm0 15c7.168 0 13 5.832 13 13s-5.832 13-13 13-13-5.832-13-13 5.832-13 13-13zm40.5 67.5c0-20.678 16.822-37.5 37.5-37.5s37.5 16.822 37.5 37.5-16.822 37.5-37.5 37.5-37.5-16.822-37.5-37.5zm120 0c0-20.678 16.822-37.5 37.5-37.5s37.5 16.822 37.5 37.5-16.822 37.5-37.5 37.5-37.5-16.822-37.5-37.5z"/></svg>',
      'outbreak': '<svg viewBox="0 0 64 64" fill="currentColor" xmlns="http://www.w3.org/2000/svg"><path d="M35,64H29a3,3,0,0,1,0-6V50.757a18.909,18.909,0,0,1-8.138-3.376L19,49.243a3,3,0,0,1-4.243,4.243l-4.242-4.243a3,3,0,0,1,0-4.243,3.071,3.071,0,0,1,4.243,0l1.862-1.862A18.909,18.909,0,0,1,13.243,35H6a3,3,0,0,1-6,0V29a3,3,0,0,1,6,0h7.243a18.909,18.909,0,0,1,3.376-8.138L14.757,19a3,3,0,0,1-4.243-4.243l4.243-4.242A3,3,0,1,1,19,14.757h0l1.862,1.862A18.909,18.909,0,0,1,29,13.243V6a3,3,0,0,1,0-6h6a3,3,0,0,1,0,6v7.243a18.909,18.909,0,0,1,8.138,3.376L45,14.757a3,3,0,0,1,4.243-4.243l4.242,4.243A3,3,0,1,1,49.243,19h0l-1.862,1.862A18.909,18.909,0,0,1,50.757,29H58a3,3,0,0,1,6,0v6a3,3,0,0,1-6,0H50.757a18.909,18.909,0,0,1-3.376,8.138L49.243,45a3.07,3.07,0,0,1,4.242,0,3,3,0,0,1,0,4.243l-4.243,4.242A3,3,0,1,1,45,49.243h0l-1.862-1.862A18.909,18.909,0,0,1,35,50.757V58a3,3,0,0,1,0,6Z"/></svg>',
      'food': '<svg viewBox="0 0 128 128" fill="currentColor" xmlns="http://www.w3.org/2000/svg"><path d="m96.593 24.142c-.022-.38-.206-.732-.505-.969-9.253-7.291-20.354-11.145-32.103-11.145-28.658 0-51.973 23.314-51.973 51.972 0 11.749 3.854 22.85 11.146 32.103.236.299.589.483.969.505.026.002.052.003.078.003.353 0 .693-.14.943-.391l71.057-71.057c.27-.269.41-.641.388-1.021z"/></svg>',
      'hazard': '<svg viewBox="0 0 267 267" fill="currentColor" xmlns="http://www.w3.org/2000/svg"><path d="m181.966 139.367c-14.878-6.557-31.333-10.2-48.633-10.2-10.42 0-20.535 1.322-30.186 3.808z"/></svg>',
      'complex': '<svg viewBox="0 0 24 24" fill="currentColor" xmlns="http://www.w3.org/2000/svg"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>'
    };

    // ── Region bounds ──
    var REGION_BOUNDS = {
      all: null,
      asia: [[-10, 60], [45, 145]],
      'east africa': [[-15, 25], [20, 55]],
      latam: [[-55, -120], [30, -30]],
      mena: [[10, -15], [45, 65]],
      rai: [[-35, -20], [40, 55]],
      'west and central africa': [[-5, -20], [25, 20]]
    };

    // ── Core functions ──
    function getLatestPerClassification(list) {
      var grouped = {};
      list.forEach(function(c) {
        var key = c.classificationId || c.id;
        var num = c.reclassificationNumber || 1;
        if (!grouped[key] || num > (grouped[key].reclassificationNumber || 1)) {
          grouped[key] = c;
        }
      });
      return Object.keys(grouped).map(function(k) { return grouped[k]; });
    }

    function getHighestStance(items) {
      var order = { red: 3, orange: 2, yellow: 1, white: 0 };
      var highest = 'white';
      items.forEach(function(c) {
        var s = (c.stance || 'white').toLowerCase();
        if ((order[s] || 0) > (order[highest] || 0)) highest = s;
      });
      return highest;
    }

    function stanceColor(stance) {
      return IRC.STANCE_COLORS[stance] || '#E9E9E9';
    }

    function matchGeoToClassification(geoName, byCountry) {
      if (byCountry[geoName]) return byCountry[geoName];
      var aliasName = GEO_TO_CLASS[geoName];
      if (aliasName && byCountry[aliasName]) return byCountry[aliasName];
      var lowerGeo = geoName.toLowerCase();
      var keys = Object.keys(byCountry);
      for (var i = 0; i < keys.length; i++) {
        if (keys[i].toLowerCase() === lowerGeo) return byCountry[keys[i]];
      }
      for (var j = 0; j < keys.length; j++) {
        if (keys[j].toLowerCase().indexOf(lowerGeo) === 0) return byCountry[keys[j]];
      }
      return null;
    }

    function getSeverityColor(avgSeverity) {
      if (avgSeverity === null || avgSeverity === undefined || avgSeverity === 0) return '#E9E9E9';
      if (avgSeverity <= 3) {
        var t = (avgSeverity - 1) / 2;
        return lerpColor('#FFF4CC', '#FFC72C', Math.max(0, t));
      }
      if (avgSeverity <= 6) {
        var t2 = (avgSeverity - 3) / 3;
        return lerpColor('#FFC72C', '#F58220', t2);
      }
      var t3 = (avgSeverity - 6) / 4;
      return lerpColor('#F58220', '#E52911', Math.min(1, t3));
    }

    function lerpColor(a, b, t) {
      var ar = parseInt(a.slice(1,3), 16), ag = parseInt(a.slice(3,5), 16), ab = parseInt(a.slice(5,7), 16);
      var br = parseInt(b.slice(1,3), 16), bg = parseInt(b.slice(3,5), 16), bb = parseInt(b.slice(5,7), 16);
      var rr = Math.round(ar + (br - ar) * t);
      var rg = Math.round(ag + (bg - ag) * t);
      var rb = Math.round(ab + (bb - ab) * t);
      return '#' + ((1 << 24) + (rr << 16) + (rg << 8) + rb).toString(16).slice(1);
    }

    // ── Filter logic ──
    function getFilteredClassifications() {
      var latest = getLatestPerClassification(classifications);
      var filtered = latest.filter(function(c) {
        // Status filter
        if (statusFilter === 'active' && IRC.isExpired(c.expirationDate)) return false;

        // Time period filter
        if (timePeriod === 'fy') {
          var d = new Date(c.date);
          if (d < fyStart || d > fyEnd) return false;
        } else if (timePeriod === '12m') {
          var twelveAgo = new Date();
          twelveAgo.setFullYear(twelveAgo.getFullYear() - 1);
          if (new Date(c.date) < twelveAgo) return false;
        }

        // Type filter (multi-select; empty = all)
        if (selectedTypes.length > 0 && selectedTypes.indexOf(c.type) === -1) return false;

        // Stance filter (multi-select; empty = all)
        if (selectedStances.length > 0) {
          var s = (c.stance || 'white').toLowerCase();
          if (selectedStances.indexOf(s) === -1) return false;
        }

        return true;
      });

      return filtered;
    }

    function getCountryMap(filtered) {
      var byCountry = {};
      filtered.forEach(function(c) {
        if (!c.country) return;
        var name = IRC.normalizeCountry(c.country);
        if (!byCountry[name]) byCountry[name] = [];
        byCountry[name].push(c);
      });
      return byCountry;
    }

    // ── Title generation ──
    function generateTitle() {
      if (titleEdited) return;
      var parts = [];

      // Status
      if (statusFilter === 'active') parts.push('Active');

      // Stances
      if (selectedStances.length > 0 && selectedStances.length < 4) {
        var stanceLabels = selectedStances.map(function(s) {
          return s.charAt(0).toUpperCase() + s.slice(1);
        });
        parts.push(stanceLabels.join(' & '));
      }

      // Types
      if (selectedTypes.length > 0 && selectedTypes.length <= 3) {
        var typeLabels = selectedTypes.map(function(t) {
          return (IRC.TYPE_LABELS[t] || t);
        });
        parts.push(typeLabels.join(' & '));
      }

      parts.push('Classifications');

      // Time suffix
      var timeSuffix = '';
      if (timePeriod === 'fy') timeSuffix = ' \u2014 ' + fyLabel;
      else if (timePeriod === '12m') timeSuffix = ' \u2014 Last 12 Months';

      document.getElementById('map-title').textContent = parts.join(' ') + timeSuffix;
    }

    // Title edit tracking
    document.getElementById('map-title').addEventListener('input', function() {
      titleEdited = true;
    });
    document.getElementById('map-title').addEventListener('keydown', function(e) {
      if (e.key === 'Enter') {
        e.preventDefault();
        this.blur();
      }
    });

    // ── Leaflet map ──
    var map = null;
    var geoLayer = null;
    var geoData = null;

    function initMap() {
      map = L.map('maps-container', {
        center: [15, 20],
        zoom: 2,
        minZoom: 2,
        maxZoom: 7,
        worldCopyJump: true,
        zoomControl: true,
        attributionControl: false,
        preferCanvas: true
      });

      L.tileLayer('https://{s}.basemaps.cartocdn.com/light_nolabels/{z}/{x}/{y}{r}.png', {
        subdomains: 'abcd',
        maxZoom: 19
      }).addTo(map);

      L.tileLayer('https://{s}.basemaps.cartocdn.com/light_only_labels/{z}/{x}/{y}{r}.png', {
        subdomains: 'abcd',
        maxZoom: 19,
        pane: 'overlayPane'
      }).addTo(map);

      fetch('countries-simplified.json')
        .then(function(res) { return res.json(); })
        .then(function(data) {
          geoData = data;
          applyFilters();
        })
        .catch(function(err) {
          console.warn('Failed to load map data:', err);
          document.getElementById('maps-container').innerHTML =
            '<div style="display:flex;align-items:center;justify-content:center;height:100%;color:#666;">Map data unavailable</div>';
        });
    }

    function renderMapLayer() {
      if (!map || !geoData) return;
      if (geoLayer) map.removeLayer(geoLayer);

      var filtered = getFilteredClassifications();
      var byCountry = getCountryMap(filtered);

      // Update summary
      document.getElementById('filter-summary').textContent = filtered.length + ' classification' + (filtered.length !== 1 ? 's' : '') + ' shown';

      geoLayer = L.geoJSON(geoData, {
        style: function(feature) {
          var name = feature.properties.name;
          var items = matchGeoToClassification(name, byCountry);

          if (!items) {
            return { fillColor: '#f0f0f0', fillOpacity: 0.15, color: '#999', weight: 0.5, opacity: 0.6 };
          }

          var fillColor, fillOpacity = 0.7;
          if (displayMode === 'severity') {
            var totalSev = 0, sevCount = 0;
            items.forEach(function(c) {
              if (c.severity !== null && c.severity !== undefined) {
                totalSev += Number(c.severity);
                sevCount++;
              }
            });
            var avgSev = sevCount > 0 ? totalSev / sevCount : 0;
            fillColor = getSeverityColor(avgSev);
          } else {
            var stance = getHighestStance(items);
            fillColor = stanceColor(stance);
          }

          return { fillColor: fillColor, fillOpacity: fillOpacity, color: '#999', weight: 0.5, opacity: 0.6 };
        },
        onEachFeature: function(feature, layer) {
          var name = feature.properties.name;
          var items = matchGeoToClassification(name, byCountry);
          var displayName = items ? (items[0].country || name) : name;

          // Tooltip
          var tipHtml = '<div class="map-tip-name">' + displayName + '</div>';
          if (items) {
            var topStance = getHighestStance(items);
            var stanceLabel = topStance.charAt(0).toUpperCase() + topStance.slice(1);
            var color = stanceColor(topStance);
            var isRed = topStance === 'red';

            var seenTypes = {};
            items.forEach(function(c) { if (c.type) seenTypes[c.type] = true; });
            var typeIconsHtml = Object.keys(seenTypes).map(function(t) {
              var icon = typeIcons[t];
              return icon ? '<span class="map-tip-type">' + icon + '</span>' : '';
            }).join('');

            tipHtml += '<div class="map-tip-row">';
            tipHtml += '<span class="map-tip-stance" style="background:' + color + ';color:' + (isRed ? '#fff' : '#000') + ';">' + stanceLabel + '</span>';
            tipHtml += typeIconsHtml;
            tipHtml += '</div>';

            if (displayMode === 'severity') {
              var totalSev = 0, sevCount = 0;
              items.forEach(function(c) {
                if (c.severity !== null && c.severity !== undefined) { totalSev += Number(c.severity); sevCount++; }
              });
              if (sevCount > 0) {
                tipHtml += '<div class="map-tip-count">Avg severity: ' + (totalSev / sevCount).toFixed(1) + '</div>';
              }
            }

            if (items.length > 1) {
              tipHtml += '<div class="map-tip-count">' + items.length + ' classifications</div>';
            }
          }
          layer.bindTooltip(tipHtml, { sticky: true, direction: 'top', offset: [0, -10], className: 'map-country-tooltip' });

          // Hover highlight
          layer.on('mouseover', function() {
            this.setStyle({ weight: 2, color: '#333', fillOpacity: items ? 0.85 : 0.3 });
            this.bringToFront();
          });
          layer.on('mouseout', function() {
            geoLayer.resetStyle(this);
          });

          // Popup for countries with data
          if (items) {
            var popupHtml = '<div class="map-popup-title">' + displayName + '</div>';
            items.forEach(function(c, idx) {
              if (idx > 0) popupHtml += '<div class="map-popup-multi"></div>';
              var stance = c.stance ? c.stance.charAt(0).toUpperCase() + c.stance.slice(1) : 'White';
              var sc = stanceColor(c.stance);
              var isR = c.stance === 'red';
              var sev = (c.severity !== null && c.severity !== undefined) ? ' ' + c.severity : '';
              popupHtml += '<span class="map-popup-stance" style="background:' + sc + ';color:' + (isR ? '#fff' : '#000') + ';">' + stance + sev + '</span>';
              if (c.emergencyName) popupHtml += '<div class="map-popup-detail">' + c.emergencyName + '</div>';
              if (c.type) popupHtml += '<div class="map-popup-detail">Type: ' + (IRC.TYPE_LABELS[c.type] || c.type) + '</div>';
              if (c.date) popupHtml += '<div class="map-popup-detail">Date: ' + IRC.formatDate(c.date) + '</div>';
              var daysLeft = IRC.daysUntilExpiration(c.expirationDate);
              if (daysLeft !== null) {
                if (daysLeft < 0) popupHtml += '<div class="map-popup-detail" style="color:#E52911;">Expired</div>';
                else if (daysLeft <= 7) popupHtml += '<div class="map-popup-detail" style="color:#F58220;">' + daysLeft + ' days until expiry</div>';
              }
              popupHtml += '<a class="map-popup-link" href="classify.html?view=' + encodeURIComponent(c.id) + '">View details &rarr;</a>';
            });
            layer.bindPopup(popupHtml, { maxWidth: 280, className: 'map-classification-popup' });
          }
        }
      }).addTo(map);
    }

    function renderLegend() {
      var legendEl = document.getElementById('maps-legend');
      if (displayMode === 'severity') {
        legendEl.innerHTML =
          '<span style="font-size:0.8rem;color:#555;font-weight:500;">Severity</span>' +
          '<div style="display:flex;flex-direction:column;gap:2px;">' +
            '<div class="legend-gradient-bar" style="background:linear-gradient(to right, #FFF4CC, #FFC72C, #F58220, #E52911);"></div>' +
            '<div class="legend-gradient-labels"><span>0</span><span>3</span><span>6</span><span>10</span></div>' +
          '</div>';
      } else {
        var stances = [
          { label: 'Red', color: '#E52911' },
          { label: 'Orange', color: '#F58220' },
          { label: 'Yellow', color: '#FFC72C' },
          { label: 'White', color: '#E9E9E9' }
        ];
        legendEl.innerHTML = stances.map(function(s) {
          return '<div class="legend-item"><span class="legend-dot" style="background:' + s.color + ';"></span>' + s.label + '</div>';
        }).join('');
      }
    }

    // ── Master apply ──
    function applyFilters() {
      generateTitle();
      renderMapLayer();
      renderLegend();

      // Region zoom
      var bounds = REGION_BOUNDS[regionFilter];
      if (bounds && map) {
        map.fitBounds(bounds, { padding: [20, 20], animate: true });
      } else if (map && regionFilter === 'all') {
        map.setView([15, 20], 2, { animate: true });
      }
    }

    // ── Filter event handlers ──

    // Time period pills (single-select)
    document.getElementById('time-pills').addEventListener('click', function(e) {
      var btn = e.target.closest('.filter-pill');
      if (!btn) return;
      this.querySelectorAll('.filter-pill').forEach(function(p) { p.classList.remove('active'); });
      btn.classList.add('active');
      timePeriod = btn.getAttribute('data-period');
      applyFilters();
    });

    // Type toggles (multi-select)
    document.getElementById('type-toggles').addEventListener('click', function(e) {
      var btn = e.target.closest('.toggle-btn');
      if (!btn) return;
      btn.classList.toggle('active');
      selectedTypes = [];
      this.querySelectorAll('.toggle-btn.active').forEach(function(b) {
        selectedTypes.push(b.getAttribute('data-type'));
      });
      applyFilters();
    });

    // Stance toggles (multi-select)
    document.getElementById('stance-toggles').addEventListener('click', function(e) {
      var btn = e.target.closest('.toggle-btn');
      if (!btn) return;
      btn.classList.toggle('active');
      selectedStances = [];
      this.querySelectorAll('.toggle-btn.active').forEach(function(b) {
        selectedStances.push(b.getAttribute('data-stance'));
      });
      applyFilters();
    });

    // Region select
    document.getElementById('region-select').addEventListener('change', function() {
      regionFilter = this.value;
      applyFilters();
    });

    // Display mode
    document.querySelectorAll('input[name="display-mode"]').forEach(function(radio) {
      radio.addEventListener('change', function() {
        displayMode = this.value;
        applyFilters();
      });
    });

    // Status pills (single-select)
    document.getElementById('status-pills').addEventListener('click', function(e) {
      var btn = e.target.closest('.filter-pill');
      if (!btn) return;
      this.querySelectorAll('.filter-pill').forEach(function(p) { p.classList.remove('active'); });
      btn.classList.add('active');
      statusFilter = btn.getAttribute('data-status');
      applyFilters();
    });

    // ── PNG Export ──
    // Renders GeoJSON polygons directly onto a high-res canvas using Web Mercator
    // projection. No DOM capture, no external libraries — pixel-perfect at any
    // resolution. Matches Leaflet's on-screen view bounds.

    function latToMercY(lat) {
      var rad = lat * Math.PI / 180;
      return Math.log(Math.tan(Math.PI / 4 + rad / 2));
    }

    function projectLng(lng, mapX, mapW, lngMin, lngMax) {
      return mapX + (lng - lngMin) / (lngMax - lngMin) * mapW;
    }

    function projectLat(lat, mapY, mapH, latMin, latMax) {
      var yMin = latToMercY(latMin);
      var yMax = latToMercY(latMax);
      var y = latToMercY(lat);
      return mapY + mapH - (y - yMin) / (yMax - yMin) * mapH;
    }

    document.getElementById('export-btn').addEventListener('click', function() {
      var btn = this;
      btn.disabled = true;
      btn.textContent = 'Exporting...';

      // Use requestAnimationFrame so the button text updates before heavy work
      requestAnimationFrame(function() { setTimeout(doExport, 50); });

      function doExport() {
      try {

      var branded = document.getElementById('branding-toggle').checked;
      var title = document.getElementById('map-title').textContent;
      var filtered = getFilteredClassifications();
      var byCountry = getCountryMap(filtered);
      var today = new Date().toISOString().split('T')[0];

      // Canvas dimensions (2x for retina/print quality)
      var W = 3200;
      var padding = 80;
      var headerH = branded ? 180 : 0;
      var legendH = 100;
      var footerH = branded ? 80 : 0;

      // Use Leaflet's current view bounds for projection
      var bounds = map.getBounds();
      var lngMin = bounds.getWest();
      var lngMax = bounds.getEast();
      var latMin = Math.max(bounds.getSouth(), -85);
      var latMax = Math.min(bounds.getNorth(), 85);

      // Calculate map height from Mercator aspect ratio of current view
      var mercYMin = latToMercY(latMin);
      var mercYMax = latToMercY(latMax);
      var lngSpan = lngMax - lngMin;
      var mercSpan = mercYMax - mercYMin;
      var mapH = Math.round(W * (mercSpan / (lngSpan * Math.PI / 180) * (Math.PI / 180)));
      // Clamp to reasonable range
      mapH = Math.max(800, Math.min(mapH, 2400));

      var totalH = headerH + mapH + legendH + footerH;

      var mapX = 0;
      var mapY = headerH;
      var mapW = W;

      var canvas = document.createElement('canvas');
      canvas.width = W;
      canvas.height = totalH;
      var ctx = canvas.getContext('2d');

      // White page background
      ctx.fillStyle = '#ffffff';
      ctx.fillRect(0, 0, W, totalH);

      // Map area background (light gray like Leaflet)
      ctx.fillStyle = '#f0f0f0';
      ctx.fillRect(mapX, mapY, mapW, mapH);

      // Clip map rendering to map area
      ctx.save();
      ctx.beginPath();
      ctx.rect(mapX, mapY, mapW, mapH);
      ctx.clip();

      // ── Pass 1: Unmatched countries (subtle background) ──
      if (geoData && geoData.features) {
        geoData.features.forEach(function(feature) {
          var name = feature.properties.name;
          var items = matchGeoToClassification(name, byCountry);
          if (items) return;
          drawFeature(ctx, feature, '#e8e8e8', 1, '#d0d0d0', 1, 0.8);
        });
      }

      // ── Pass 2: Matched countries (colored fills, drawn on top) ──
      if (geoData && geoData.features) {
        geoData.features.forEach(function(feature) {
          var name = feature.properties.name;
          var items = matchGeoToClassification(name, byCountry);
          if (!items) return;

          var fillColor;
          if (displayMode === 'severity') {
            var totalSev = 0, sevCount = 0;
            items.forEach(function(c) {
              if (c.severity !== null && c.severity !== undefined) { totalSev += Number(c.severity); sevCount++; }
            });
            fillColor = getSeverityColor(sevCount > 0 ? totalSev / sevCount : 0);
          } else {
            fillColor = stanceColor(getHighestStance(items));
          }
          drawFeature(ctx, feature, fillColor, 1, '#777', 1, 1);
        });
      }

      // ── Pass 3: Crisp country borders on top of everything ──
      ctx.globalAlpha = 0.5;
      ctx.strokeStyle = '#bbb';
      ctx.lineWidth = 1;
      if (geoData && geoData.features) {
        geoData.features.forEach(function(feature) {
          drawFeatureStroke(ctx, feature);
        });
      }
      ctx.globalAlpha = 1;

      // ── Country labels for classified countries ──
      ctx.font = 'bold 28px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif';
      ctx.textAlign = 'center';
      if (geoData && geoData.features) {
        geoData.features.forEach(function(feature) {
          var name = feature.properties.name;
          var items = matchGeoToClassification(name, byCountry);
          if (!items) return;
          var centroid = getFeatureCentroid(feature);
          var cx = projectLng(centroid[0], mapX, mapW, lngMin, lngMax);
          var cy = projectLat(centroid[1], mapY, mapH, latMin, latMax);
          if (cx > padding && cx < W - padding && cy > mapY + 30 && cy < mapY + mapH - 30) {
            var label = items[0].country || name;
            // White text shadow for readability
            ctx.fillStyle = 'rgba(255,255,255,0.9)';
            for (var dx = -1; dx <= 1; dx++) {
              for (var dy = -1; dy <= 1; dy++) {
                if (dx === 0 && dy === 0) continue;
                ctx.fillText(label, cx + dx, cy + dy);
              }
            }
            ctx.fillStyle = '#222';
            ctx.fillText(label, cx, cy);
          }
        });
      }
      ctx.textAlign = 'start';

      // Restore clipping
      ctx.restore();

      // ── Branded header (fully synchronous — no Image loading) ──
      if (branded) {
        ctx.fillStyle = '#ffffff';
        ctx.fillRect(0, 0, W, headerH);

        // Draw IRC logo as canvas shapes (yellow square + black IRC mark)
        var lx = padding, ly2 = 36, ls = 96;
        ctx.fillStyle = '#FDC62F';
        ctx.fillRect(lx, ly2, ls, ls);
        // Black IRC letterform (simplified K-shape)
        ctx.fillStyle = '#00040C';
        var s = ls / 217; // scale factor from SVG viewBox
        ctx.fillRect(lx + 26.6*s, ly2 + 26.6*s, 163.81*s, 63.15*s);
        // Diagonal + vertical parts of the K
        ctx.beginPath();
        ctx.moveTo(lx + 134.59*s, ly2 + 89.75*s);
        ctx.lineTo(lx + 190.41*s, ly2 + 145.57*s);
        ctx.lineTo(lx + 190.41*s, ly2 + 190.39*s);
        ctx.lineTo(lx + 144.97*s, ly2 + 190.39*s);
        ctx.lineTo(lx + 89.75*s, ly2 + 135.18*s);
        ctx.lineTo(lx + 89.75*s, ly2 + 190.39*s);
        ctx.lineTo(lx + 26.6*s, ly2 + 190.39*s);
        ctx.lineTo(lx + 26.6*s, ly2 + 89.75*s);
        ctx.closePath();
        ctx.fill();

        ctx.fillStyle = '#1a1a1a';
        ctx.font = 'bold 48px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif';
        ctx.fillText(title, padding + 130, 102);
        ctx.fillStyle = '#e5e5e5';
        ctx.fillRect(padding, 158, W - padding * 2, 2);
      }

      drawLegendAndFooter();
      downloadCanvas();

      // ── Helper: draw filled + stroked polygons ──
      function drawFeature(ctx, feature, fillColor, fillAlpha, strokeColor, strokeAlpha, lineW) {
        var geom = feature.geometry;
        if (!geom) return;
        var polys = geom.type === 'MultiPolygon' ? geom.coordinates : [geom.coordinates];
        polys.forEach(function(poly) {
          poly.forEach(function(ring) {
            ctx.beginPath();
            var started = false;
            ring.forEach(function(coord) {
              var x = projectLng(coord[0], mapX, mapW, lngMin, lngMax);
              var y = projectLat(coord[1], mapY, mapH, latMin, latMax);
              if (!started) { ctx.moveTo(x, y); started = true; }
              else ctx.lineTo(x, y);
            });
            ctx.closePath();
            ctx.globalAlpha = fillAlpha;
            ctx.fillStyle = fillColor;
            ctx.fill();
            ctx.globalAlpha = strokeAlpha;
            ctx.strokeStyle = strokeColor;
            ctx.lineWidth = lineW;
            ctx.stroke();
          });
        });
        ctx.globalAlpha = 1;
      }

      // ── Helper: stroke only ──
      function drawFeatureStroke(ctx, feature) {
        var geom = feature.geometry;
        if (!geom) return;
        var polys = geom.type === 'MultiPolygon' ? geom.coordinates : [geom.coordinates];
        polys.forEach(function(poly) {
          poly.forEach(function(ring) {
            ctx.beginPath();
            var started = false;
            ring.forEach(function(coord) {
              var x = projectLng(coord[0], mapX, mapW, lngMin, lngMax);
              var y = projectLat(coord[1], mapY, mapH, latMin, latMax);
              if (!started) { ctx.moveTo(x, y); started = true; }
              else ctx.lineTo(x, y);
            });
            ctx.closePath();
            ctx.stroke();
          });
        });
      }

      // ── Helper: rough polygon centroid ──
      function getFeatureCentroid(feature) {
        var geom = feature.geometry;
        if (!geom) return [0, 0];
        var coords = geom.type === 'MultiPolygon' ? geom.coordinates[0][0] : geom.coordinates[0];
        var sumLng = 0, sumLat = 0;
        coords.forEach(function(c) { sumLng += c[0]; sumLat += c[1]; });
        return [sumLng / coords.length, sumLat / coords.length];
      }

      // ── Legend + footer ──
      function drawLegendAndFooter() {
        // Legend background
        ctx.fillStyle = '#ffffff';
        ctx.fillRect(0, headerH + mapH, W, legendH + footerH);

        var ly = headerH + mapH + 45;

        if (displayMode === 'severity') {
          ctx.font = '500 28px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif';
          ctx.fillStyle = '#555';
          ctx.fillText('Severity', padding, ly);
          var gx = padding + 160;
          var gw = 400;
          var gh = 28;
          var grad = ctx.createLinearGradient(gx, 0, gx + gw, 0);
          grad.addColorStop(0, '#FFF4CC');
          grad.addColorStop(0.3, '#FFC72C');
          grad.addColorStop(0.6, '#F58220');
          grad.addColorStop(1, '#E52911');
          ctx.fillStyle = grad;
          ctx.fillRect(gx, ly - 20, gw, gh);
          ctx.strokeStyle = '#ddd';
          ctx.lineWidth = 1;
          ctx.strokeRect(gx, ly - 20, gw, gh);
          ctx.fillStyle = '#888';
          ctx.font = '22px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif';
          ctx.fillText('0', gx, ly + 30);
          ctx.fillText('3', gx + gw * 0.3, ly + 30);
          ctx.fillText('6', gx + gw * 0.6, ly + 30);
          ctx.fillText('10', gx + gw - 10, ly + 30);
        } else {
          var stances = [
            { label: 'Red', color: '#E52911' },
            { label: 'Orange', color: '#F58220' },
            { label: 'Yellow', color: '#FFC72C' },
            { label: 'White', color: '#E9E9E9' }
          ];
          var lx = padding;
          ctx.font = '28px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif';
          stances.forEach(function(s) {
            ctx.beginPath();
            ctx.arc(lx + 14, ly - 6, 14, 0, Math.PI * 2);
            ctx.fillStyle = s.color;
            ctx.fill();
            ctx.strokeStyle = 'rgba(0,0,0,0.15)';
            ctx.lineWidth = 1.5;
            ctx.stroke();
            ctx.fillStyle = '#444';
            ctx.fillText(s.label, lx + 38, ly);
            lx += ctx.measureText(s.label).width + 100;
          });
        }

        if (branded) {
          var fy = totalH - 28;
          ctx.fillStyle = '#e5e5e5';
          ctx.fillRect(padding, fy - 28, W - padding * 2, 1);
          ctx.fillStyle = '#999';
          ctx.font = '24px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif';
          ctx.fillText('Generated ' + today + '  |  IRC Emergency Classification System  |  ' + filtered.length + ' classifications shown', padding, fy);
        }
      }

      // ── Download (async toBlob — much faster than toDataURL for large canvases) ──
      function downloadCanvas() {
        canvas.toBlob(function(blob) {
          if (!blob) {
            alert('Export failed — could not generate image.');
            btn.disabled = false;
            btn.textContent = 'Export PNG';
            return;
          }
          var url = URL.createObjectURL(blob);
          var link = document.createElement('a');
          link.download = 'irc-classification-map-' + today + '.png';
          link.href = url;
          link.click();
          // Clean up after a short delay
          setTimeout(function() { URL.revokeObjectURL(url); }, 5000);
          btn.disabled = false;
          btn.textContent = 'Export PNG';
        }, 'image/png');
      }

      } catch(err) {
        console.error('Export error:', err);
        alert('Export failed: ' + err.message);
        btn.disabled = false;
        btn.textContent = 'Export PNG';
      }
      } // end doExport
    });

    // ── Init ──
    initMap();
  </script>
</body>
</html>

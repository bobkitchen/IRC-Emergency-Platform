<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Maps — IRC Emergency Classification</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
  <style>
    .maps-layout {
      display: flex;
      min-height: calc(100vh - 180px);
      gap: 0;
    }
    .maps-sidebar {
      width: 280px;
      min-width: 280px;
      background: #fff;
      border-right: 1px solid #e5e5e5;
      padding: 20px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }
    .maps-main {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-width: 0;
    }
    .maps-title-bar {
      padding: 16px 24px;
      border-bottom: 1px solid #e5e5e5;
      background: #fff;
    }
    .maps-title {
      font-size: 1.25rem;
      font-weight: 600;
      color: #1a1a1a;
      margin: 0;
      cursor: pointer;
      padding: 4px 8px;
      border-radius: 6px;
      border: 1px solid transparent;
      transition: border-color 0.2s;
    }
    .maps-title:hover {
      border-color: #ddd;
    }
    .maps-title:focus {
      outline: none;
      border-color: #FFC72C;
      background: #FFFDF5;
    }
    .maps-title-hint {
      font-size: 0.75rem;
      color: #999;
      margin-top: 4px;
      padding-left: 8px;
    }
    #maps-container {
      flex: 1;
      min-height: 400px;
      background: #f0f0f0;
    }
    .maps-legend {
      padding: 12px 24px;
      background: #fff;
      border-top: 1px solid #e5e5e5;
      display: flex;
      align-items: center;
      gap: 16px;
      flex-wrap: wrap;
    }
    .legend-item {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 0.8rem;
      color: #555;
    }
    .legend-dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      border: 1px solid rgba(0,0,0,0.15);
    }
    .legend-gradient-bar {
      width: 200px;
      height: 14px;
      border-radius: 3px;
      border: 1px solid #ddd;
    }
    .legend-gradient-labels {
      display: flex;
      justify-content: space-between;
      width: 200px;
      font-size: 0.7rem;
      color: #888;
    }

    /* Sidebar filter styles */
    .filter-group {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .filter-label {
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: #888;
    }
    .pill-group {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }
    .filter-pill {
      padding: 5px 12px;
      border-radius: 20px;
      border: 1px solid #ddd;
      background: #fff;
      font-size: 0.8rem;
      cursor: pointer;
      transition: all 0.15s;
      color: #555;
      font-family: inherit;
    }
    .filter-pill:hover {
      border-color: #bbb;
      background: #f9f9f9;
    }
    .filter-pill.active {
      background: #1a1a1a;
      color: #fff;
      border-color: #1a1a1a;
    }
    .toggle-btn {
      padding: 5px 10px;
      border-radius: 6px;
      border: 1px solid #ddd;
      background: #fff;
      font-size: 0.78rem;
      cursor: pointer;
      transition: all 0.15s;
      color: #555;
      display: flex;
      align-items: center;
      gap: 5px;
      font-family: inherit;
    }
    .toggle-btn:hover {
      border-color: #bbb;
    }
    .toggle-btn.active {
      background: #f0f0f0;
      border-color: #999;
      color: #1a1a1a;
      font-weight: 500;
    }
    .toggle-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      border: 1px solid rgba(0,0,0,0.15);
    }
    .filter-select {
      padding: 6px 10px;
      border-radius: 6px;
      border: 1px solid #ddd;
      font-size: 0.8rem;
      font-family: inherit;
      background: #fff;
      color: #333;
      cursor: pointer;
    }
    .radio-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .radio-item {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.8rem;
      color: #555;
      cursor: pointer;
    }
    .radio-item input[type="radio"] {
      accent-color: #1a1a1a;
    }

    .sidebar-summary {
      font-size: 0.85rem;
      color: #666;
      padding: 8px 0;
      border-top: 1px solid #eee;
    }
    .sidebar-export {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .export-checkbox {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.8rem;
      color: #555;
      cursor: pointer;
    }
    .export-checkbox input {
      accent-color: #1a1a1a;
    }
    .export-btn {
      padding: 10px 16px;
      border-radius: 8px;
      border: none;
      background: #1a1a1a;
      color: #fff;
      font-size: 0.85rem;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s;
      font-family: inherit;
    }
    .export-btn:hover {
      background: #333;
    }
    .export-btn:disabled {
      background: #ccc;
      cursor: not-allowed;
    }

    /* Map tooltip styles (same as dashboard) */
    .map-country-tooltip {
      background: #fff;
      border: 1px solid #ddd;
      border-radius: 8px;
      padding: 8px 12px;
      font-size: 0.8rem;
      box-shadow: 0 2px 8px rgba(0,0,0,0.12);
      max-width: 220px;
    }
    .map-country-tooltip .leaflet-tooltip-content {
      margin: 0;
    }
    .map-tip-name {
      font-weight: 600;
      color: #1a1a1a;
      margin-bottom: 4px;
    }
    .map-tip-row {
      display: flex;
      align-items: center;
      gap: 6px;
      flex-wrap: wrap;
    }
    .map-tip-stance {
      display: inline-block;
      padding: 1px 8px;
      border-radius: 10px;
      font-size: 0.7rem;
      font-weight: 600;
    }
    .map-tip-type {
      width: 16px;
      height: 16px;
      display: inline-flex;
      color: #666;
    }
    .map-tip-type svg {
      width: 100%;
      height: 100%;
    }
    .map-tip-count {
      font-size: 0.7rem;
      color: #888;
      margin-top: 2px;
    }
    .map-popup-title {
      font-weight: 600;
      font-size: 0.95rem;
      margin-bottom: 6px;
    }
    .map-popup-stance {
      display: inline-block;
      padding: 2px 10px;
      border-radius: 10px;
      font-size: 0.75rem;
      font-weight: 600;
      margin-bottom: 4px;
    }
    .map-popup-detail {
      font-size: 0.78rem;
      color: #666;
      margin: 2px 0;
    }
    .map-popup-multi {
      border-top: 1px solid #eee;
      margin: 8px 0;
    }
    .map-popup-link {
      display: inline-block;
      margin-top: 4px;
      font-size: 0.75rem;
      color: #2563eb;
      text-decoration: none;
    }

    @media (max-width: 768px) {
      .maps-layout {
        flex-direction: column;
      }
      .maps-sidebar {
        width: 100%;
        min-width: 100%;
        border-right: none;
        border-bottom: 1px solid #e5e5e5;
        max-height: 320px;
        overflow-y: auto;
      }
      #maps-container {
        min-height: 400px;
      }
    }
  </style>
</head>
<body>
  <div id="header-mount"></div>
  <main>
    <div id="nav-mount"></div>
    <div class="maps-layout">
      <!-- Sidebar -->
      <div class="maps-sidebar">
        <!-- Time Period -->
        <div class="filter-group">
          <div class="filter-label">Time Period</div>
          <div class="pill-group" id="time-pills">
            <button class="filter-pill active" data-period="all">All time</button>
            <button class="filter-pill" data-period="fy" id="fy-pill">FY26</button>
            <button class="filter-pill" data-period="12m">Last 12 months</button>
          </div>
        </div>

        <!-- Emergency Type -->
        <div class="filter-group">
          <div class="filter-label">Emergency Type</div>
          <div class="pill-group" id="type-toggles">
            <button class="toggle-btn" data-type="conflict">Conflict</button>
            <button class="toggle-btn" data-type="outbreak">Outbreak</button>
            <button class="toggle-btn" data-type="food">Food</button>
            <button class="toggle-btn" data-type="hazard">Hazard</button>
            <button class="toggle-btn" data-type="complex">Complex</button>
          </div>
        </div>

        <!-- Stance -->
        <div class="filter-group">
          <div class="filter-label">Stance</div>
          <div class="pill-group" id="stance-toggles">
            <button class="toggle-btn" data-stance="red"><span class="toggle-dot" style="background:#E52911;"></span> Red</button>
            <button class="toggle-btn" data-stance="orange"><span class="toggle-dot" style="background:#F58220;"></span> Orange</button>
            <button class="toggle-btn" data-stance="yellow"><span class="toggle-dot" style="background:#FFC72C;"></span> Yellow</button>
            <button class="toggle-btn" data-stance="white"><span class="toggle-dot" style="background:#E9E9E9;"></span> White</button>
          </div>
        </div>

        <!-- Region -->
        <div class="filter-group">
          <div class="filter-label">Region</div>
          <select class="filter-select" id="region-select">
            <option value="all">All Regions</option>
            <option value="asia">Asia</option>
            <option value="east africa">East Africa</option>
            <option value="latam">LatAm</option>
            <option value="mena">MENA</option>
            <option value="rai">RAI</option>
            <option value="west and central africa">West & Central Africa</option>
          </select>
        </div>

        <!-- Display Mode -->
        <div class="filter-group">
          <div class="filter-label">Display Mode</div>
          <div class="radio-group">
            <label class="radio-item"><input type="radio" name="display-mode" value="stance" checked> Stance color</label>
            <label class="radio-item"><input type="radio" name="display-mode" value="severity"> Severity heatmap</label>
          </div>
        </div>

        <!-- Status -->
        <div class="filter-group">
          <div class="filter-label">Status</div>
          <div class="pill-group" id="status-pills">
            <button class="filter-pill active" data-status="active">Active only</button>
            <button class="filter-pill" data-status="all">All</button>
          </div>
        </div>

        <!-- Summary -->
        <div class="sidebar-summary" id="filter-summary">0 classifications shown</div>

        <!-- Export -->
        <div class="sidebar-export">
          <label class="export-checkbox">
            <input type="checkbox" id="branding-toggle" checked> IRC branding
          </label>
          <button class="export-btn" id="export-btn">Export PNG</button>
        </div>
      </div>

      <!-- Main map area -->
      <div class="maps-main">
        <div class="maps-title-bar">
          <h2 class="maps-title" id="map-title" contenteditable="true" spellcheck="false">Active Classifications</h2>
          <div class="maps-title-hint">Click to edit title</div>
        </div>
        <div id="maps-container"></div>
        <div class="maps-legend" id="maps-legend"></div>
      </div>
    </div>
  </main>
  <div id="footer-mount"></div>

  <script src="irc-shared.iife.js"></script>
  <script src="supabase.js"></script>
  <script src="shared.js"></script>
  <script>
    // Render shared chrome
    document.getElementById('header-mount').innerHTML = IRC.renderHeader('maps');
    document.getElementById('nav-mount').innerHTML = IRC.renderNav();
    document.getElementById('footer-mount').innerHTML = IRC.renderFooter();

    // ── State ──
    var classifications = IRC.getClassifications();
    var timePeriod = 'all';
    var statusFilter = 'active';
    var selectedTypes = [];    // empty = all
    var selectedStances = [];  // empty = all
    var regionFilter = 'all';
    var displayMode = 'stance';
    var titleEdited = false;

    // Fiscal year
    var now = new Date();
    var currentFY = now.getMonth() >= 9 ? now.getFullYear() + 1 : now.getFullYear();
    var fyLabel = 'FY' + String(currentFY).slice(-2);
    var fyStart = new Date(currentFY - 1, 9, 1);
    var fyEnd = new Date(currentFY, 8, 30, 23, 59, 59);
    document.getElementById('fy-pill').textContent = fyLabel;

    // ── Async load from Supabase ──
    IRC.db.migrateFromLocalStorage().then(function() {
      return IRC.db.load();
    }).then(function(data) {
      classifications = data;
      applyFilters();
    });

    Object.keys(GEO_TO_CLASS).forEach(function(k) { CLASS_TO_GEO[GEO_TO_CLASS[k]] = k; });

    // ── Region bounds ──
    var REGION_BOUNDS = {
      all: null,
      asia: [[-10, 60], [45, 145]],
      'east africa': [[-15, 25], [20, 55]],
      latam: [[-55, -120], [30, -30]],
      mena: [[10, -15], [45, 65]],
      rai: [[-35, -20], [40, 55]],
      'west and central africa': [[-5, -20], [25, 20]]
    };

    // ── Core functions ──
    function getLatestPerClassification(list) {
      var grouped = {};
      list.forEach(function(c) {
        var key = c.classificationId || c.id;
        var num = c.reclassificationNumber || 1;
        if (!grouped[key] || num > (grouped[key].reclassificationNumber || 1)) {
          grouped[key] = c;
        }
      });
      return Object.keys(grouped).map(function(k) { return grouped[k]; });
    }

    function getHighestStance(items) {
      var order = { red: 3, orange: 2, yellow: 1, white: 0 };
      var highest = 'white';
      items.forEach(function(c) {
        var s = (c.stance || 'white').toLowerCase();
        if ((order[s] || 0) > (order[highest] || 0)) highest = s;
      });
      return highest;
    }

    function stanceColor(stance) {
      return IRC.STANCE_COLORS[stance] || '#E9E9E9';
    }

    function matchGeoToClassification(geoName, byCountry) {
      if (byCountry[geoName]) return byCountry[geoName];
      var aliasName = GEO_TO_CLASS[geoName];
      if (aliasName && byCountry[aliasName]) return byCountry[aliasName];
      var lowerGeo = geoName.toLowerCase();
      var keys = Object.keys(byCountry);
      for (var i = 0; i < keys.length; i++) {
        if (keys[i].toLowerCase() === lowerGeo) return byCountry[keys[i]];
      }
      for (var j = 0; j < keys.length; j++) {
        if (keys[j].toLowerCase().indexOf(lowerGeo) === 0) return byCountry[keys[j]];
      }
      return null;
    }

    function getSeverityColor(avgSeverity) {
      if (avgSeverity === null || avgSeverity === undefined || avgSeverity === 0) return '#E9E9E9';
      if (avgSeverity <= 3) {
        var t = (avgSeverity - 1) / 2;
        return lerpColor('#FFF4CC', '#FFC72C', Math.max(0, t));
      }
      if (avgSeverity <= 6) {
        var t2 = (avgSeverity - 3) / 3;
        return lerpColor('#FFC72C', '#F58220', t2);
      }
      var t3 = (avgSeverity - 6) / 4;
      return lerpColor('#F58220', '#E52911', Math.min(1, t3));
    }

    function lerpColor(a, b, t) {
      var ar = parseInt(a.slice(1,3), 16), ag = parseInt(a.slice(3,5), 16), ab = parseInt(a.slice(5,7), 16);
      var br = parseInt(b.slice(1,3), 16), bg = parseInt(b.slice(3,5), 16), bb = parseInt(b.slice(5,7), 16);
      var rr = Math.round(ar + (br - ar) * t);
      var rg = Math.round(ag + (bg - ag) * t);
      var rb = Math.round(ab + (bb - ab) * t);
      return '#' + ((1 << 24) + (rr << 16) + (rg << 8) + rb).toString(16).slice(1);
    }

    // ── Filter logic ──
    function getFilteredClassifications() {
      var latest = getLatestPerClassification(classifications);
      var filtered = latest.filter(function(c) {
        // Status filter
        if (statusFilter === 'active' && IRC.isExpired(c.expirationDate)) return false;

        // Time period filter
        if (timePeriod === 'fy') {
          var d = new Date(c.date);
          if (d < fyStart || d > fyEnd) return false;
        } else if (timePeriod === '12m') {
          var twelveAgo = new Date();
          twelveAgo.setFullYear(twelveAgo.getFullYear() - 1);
          if (new Date(c.date) < twelveAgo) return false;
        }

        // Type filter (multi-select; empty = all)
        if (selectedTypes.length > 0 && selectedTypes.indexOf(c.type) === -1) return false;

        // Stance filter (multi-select; empty = all)
        if (selectedStances.length > 0) {
          var s = (c.stance || 'white').toLowerCase();
          if (selectedStances.indexOf(s) === -1) return false;
        }

        return true;
      });

      return filtered;
    }

    function getCountryMap(filtered) {
      var byCountry = {};
      filtered.forEach(function(c) {
        if (!c.country) return;
        var name = IRC.normalizeCountry(c.country);
        if (!byCountry[name]) byCountry[name] = [];
        byCountry[name].push(c);
      });
      return byCountry;
    }

    // ── Title generation ──
    function generateTitle() {
      if (titleEdited) return;
      var parts = [];

      // Status
      if (statusFilter === 'active') parts.push('Active');

      // Stances
      if (selectedStances.length > 0 && selectedStances.length < 4) {
        var stanceLabels = selectedStances.map(function(s) {
          return s.charAt(0).toUpperCase() + s.slice(1);
        });
        parts.push(stanceLabels.join(' & '));
      }

      // Types
      if (selectedTypes.length > 0 && selectedTypes.length <= 3) {
        var typeLabels = selectedTypes.map(function(t) {
          return (IRC.TYPE_LABELS[t] || t);
        });
        parts.push(typeLabels.join(' & '));
      }

      parts.push('Classifications');

      // Time suffix
      var timeSuffix = '';
      if (timePeriod === 'fy') timeSuffix = ' \u2014 ' + fyLabel;
      else if (timePeriod === '12m') timeSuffix = ' \u2014 Last 12 Months';

      document.getElementById('map-title').textContent = parts.join(' ') + timeSuffix;
    }

    // Title edit tracking
    document.getElementById('map-title').addEventListener('input', function() {
      titleEdited = true;
    });
    document.getElementById('map-title').addEventListener('keydown', function(e) {
      if (e.key === 'Enter') {
        e.preventDefault();
        this.blur();
      }
    });

    // ── Leaflet map ──
    var map = null;
    var geoLayer = null;
    var geoData = null;

    function initMap() {
      map = L.map('maps-container', {
        center: [15, 20],
        zoom: 2,
        minZoom: 2,
        maxZoom: 7,
        worldCopyJump: true,
        zoomControl: true,
        attributionControl: false,
        preferCanvas: true
      });

      L.tileLayer('https://{s}.basemaps.cartocdn.com/light_nolabels/{z}/{x}/{y}{r}.png', {
        subdomains: 'abcd',
        maxZoom: 19
      }).addTo(map);

      L.tileLayer('https://{s}.basemaps.cartocdn.com/light_only_labels/{z}/{x}/{y}{r}.png', {
        subdomains: 'abcd',
        maxZoom: 19,
        pane: 'overlayPane'
      }).addTo(map);

      fetch('countries-simplified.json')
        .then(function(res) { return res.json(); })
        .then(function(data) {
          geoData = data;
          applyFilters();
        })
        .catch(function(err) {
          console.warn('Failed to load map data:', err);
          document.getElementById('maps-container').innerHTML =
            '<div style="display:flex;align-items:center;justify-content:center;height:100%;color:#666;">Map data unavailable</div>';
        });
    }

    function renderMapLayer() {
      if (!map || !geoData) return;
      if (geoLayer) map.removeLayer(geoLayer);

      var filtered = getFilteredClassifications();
      var byCountry = getCountryMap(filtered);

      // Update summary
      document.getElementById('filter-summary').textContent = filtered.length + ' classification' + (filtered.length !== 1 ? 's' : '') + ' shown';

      geoLayer = L.geoJSON(geoData, {
        style: function(feature) {
          var name = feature.properties.name;
          var items = matchGeoToClassification(name, byCountry);

          if (!items) {
            return { fillColor: '#f0f0f0', fillOpacity: 0.15, color: '#999', weight: 0.5, opacity: 0.6 };
          }

          var fillColor, fillOpacity = 0.7;
          if (displayMode === 'severity') {
            var totalSev = 0, sevCount = 0;
            items.forEach(function(c) {
              if (c.severity !== null && c.severity !== undefined) {
                totalSev += Number(c.severity);
                sevCount++;
              }
            });
            var avgSev = sevCount > 0 ? totalSev / sevCount : 0;
            fillColor = getSeverityColor(avgSev);
          } else {
            var stance = getHighestStance(items);
            fillColor = stanceColor(stance);
          }

          return { fillColor: fillColor, fillOpacity: fillOpacity, color: '#999', weight: 0.5, opacity: 0.6 };
        },
        onEachFeature: function(feature, layer) {
          var name = feature.properties.name;
          var items = matchGeoToClassification(name, byCountry);
          var displayName = items ? (items[0].country || name) : name;

          // Tooltip
          var tipHtml = '<div class="map-tip-name">' + displayName + '</div>';
          if (items) {
            var topStance = getHighestStance(items);
            var stanceLabel = topStance.charAt(0).toUpperCase() + topStance.slice(1);
            var color = stanceColor(topStance);
            var isRed = topStance === 'red';

            var seenTypes = {};
            items.forEach(function(c) { if (c.type) seenTypes[c.type] = true; });
            var typeIconsHtml = Object.keys(seenTypes).map(function(t) {
              var icon = typeIcons[t];
              return icon ? '<span class="map-tip-type">' + icon + '</span>' : '';
            }).join('');

            tipHtml += '<div class="map-tip-row">';
            tipHtml += '<span class="map-tip-stance" style="background:' + color + ';color:' + (isRed ? '#fff' : '#000') + ';">' + stanceLabel + '</span>';
            tipHtml += typeIconsHtml;
            tipHtml += '</div>';

            if (displayMode === 'severity') {
              var totalSev = 0, sevCount = 0;
              items.forEach(function(c) {
                if (c.severity !== null && c.severity !== undefined) { totalSev += Number(c.severity); sevCount++; }
              });
              if (sevCount > 0) {
                tipHtml += '<div class="map-tip-count">Avg severity: ' + (totalSev / sevCount).toFixed(1) + '</div>';
              }
            }

            if (items.length > 1) {
              tipHtml += '<div class="map-tip-count">' + items.length + ' classifications</div>';
            }
          }
          layer.bindTooltip(tipHtml, { sticky: true, direction: 'top', offset: [0, -10], className: 'map-country-tooltip' });

          // Hover highlight
          layer.on('mouseover', function() {
            this.setStyle({ weight: 2, color: '#333', fillOpacity: items ? 0.85 : 0.3 });
            this.bringToFront();
          });
          layer.on('mouseout', function() {
            geoLayer.resetStyle(this);
          });

          // Popup for countries with data
          if (items) {
            var popupHtml = '<div class="map-popup-title">' + displayName + '</div>';
            items.forEach(function(c, idx) {
              if (idx > 0) popupHtml += '<div class="map-popup-multi"></div>';
              var stance = c.stance ? c.stance.charAt(0).toUpperCase() + c.stance.slice(1) : 'White';
              var sc = stanceColor(c.stance);
              var isR = c.stance === 'red';
              var sev = (c.severity !== null && c.severity !== undefined) ? ' ' + c.severity : '';
              popupHtml += '<span class="map-popup-stance" style="background:' + sc + ';color:' + (isR ? '#fff' : '#000') + ';">' + stance + sev + '</span>';
              if (c.emergencyName) popupHtml += '<div class="map-popup-detail">' + c.emergencyName + '</div>';
              if (c.type) popupHtml += '<div class="map-popup-detail">Type: ' + (IRC.TYPE_LABELS[c.type] || c.type) + '</div>';
              if (c.date) popupHtml += '<div class="map-popup-detail">Date: ' + IRC.formatDate(c.date) + '</div>';
              var daysLeft = IRC.daysUntilExpiration(c.expirationDate);
              if (daysLeft !== null) {
                if (daysLeft < 0) popupHtml += '<div class="map-popup-detail" style="color:#E52911;">Expired</div>';
                else if (daysLeft <= 7) popupHtml += '<div class="map-popup-detail" style="color:#F58220;">' + daysLeft + ' days until expiry</div>';
              }
              popupHtml += '<a class="map-popup-link" href="classify.html?view=' + encodeURIComponent(c.id) + '">View details &rarr;</a>';
            });
            layer.bindPopup(popupHtml, { maxWidth: 280, className: 'map-classification-popup' });
          }
        }
      }).addTo(map);
    }

    function renderLegend() {
      var legendEl = document.getElementById('maps-legend');
      if (displayMode === 'severity') {
        legendEl.innerHTML =
          '<span style="font-size:0.8rem;color:#555;font-weight:500;">Severity</span>' +
          '<div style="display:flex;flex-direction:column;gap:2px;">' +
            '<div class="legend-gradient-bar" style="background:linear-gradient(to right, #FFF4CC, #FFC72C, #F58220, #E52911);"></div>' +
            '<div class="legend-gradient-labels"><span>0</span><span>3</span><span>6</span><span>10</span></div>' +
          '</div>';
      } else {
        var stances = [
          { label: 'Red', color: '#E52911' },
          { label: 'Orange', color: '#F58220' },
          { label: 'Yellow', color: '#FFC72C' },
          { label: 'White', color: '#E9E9E9' }
        ];
        legendEl.innerHTML = stances.map(function(s) {
          return '<div class="legend-item"><span class="legend-dot" style="background:' + s.color + ';"></span>' + s.label + '</div>';
        }).join('');
      }
    }

    // ── Master apply ──
    function applyFilters() {
      generateTitle();
      renderMapLayer();
      renderLegend();

      // Region zoom
      var bounds = REGION_BOUNDS[regionFilter];
      if (bounds && map) {
        map.fitBounds(bounds, { padding: [20, 20], animate: true });
      } else if (map && regionFilter === 'all') {
        map.setView([15, 20], 2, { animate: true });
      }
    }

    // ── Filter event handlers ──

    // Time period pills (single-select)
    document.getElementById('time-pills').addEventListener('click', function(e) {
      var btn = e.target.closest('.filter-pill');
      if (!btn) return;
      this.querySelectorAll('.filter-pill').forEach(function(p) { p.classList.remove('active'); });
      btn.classList.add('active');
      timePeriod = btn.getAttribute('data-period');
      applyFilters();
    });

    // Type toggles (multi-select)
    document.getElementById('type-toggles').addEventListener('click', function(e) {
      var btn = e.target.closest('.toggle-btn');
      if (!btn) return;
      btn.classList.toggle('active');
      selectedTypes = [];
      this.querySelectorAll('.toggle-btn.active').forEach(function(b) {
        selectedTypes.push(b.getAttribute('data-type'));
      });
      applyFilters();
    });

    // Stance toggles (multi-select)
    document.getElementById('stance-toggles').addEventListener('click', function(e) {
      var btn = e.target.closest('.toggle-btn');
      if (!btn) return;
      btn.classList.toggle('active');
      selectedStances = [];
      this.querySelectorAll('.toggle-btn.active').forEach(function(b) {
        selectedStances.push(b.getAttribute('data-stance'));
      });
      applyFilters();
    });

    // Region select
    document.getElementById('region-select').addEventListener('change', function() {
      regionFilter = this.value;
      applyFilters();
    });

    // Display mode
    document.querySelectorAll('input[name="display-mode"]').forEach(function(radio) {
      radio.addEventListener('change', function() {
        displayMode = this.value;
        applyFilters();
      });
    });

    // Status pills (single-select)
    document.getElementById('status-pills').addEventListener('click', function(e) {
      var btn = e.target.closest('.filter-pill');
      if (!btn) return;
      this.querySelectorAll('.filter-pill').forEach(function(p) { p.classList.remove('active'); });
      btn.classList.add('active');
      statusFilter = btn.getAttribute('data-status');
      applyFilters();
    });

    // ── PNG Export ──
    document.getElementById('export-btn').addEventListener('click', function() {
      var btn = this;
      btn.disabled = true;
      btn.textContent = 'Exporting...';

      var branded = document.getElementById('branding-toggle').checked;
      var title = document.getElementById('map-title').textContent;
      var filtered = getFilteredClassifications();

      // Build offscreen wrapper
      var wrapper = document.createElement('div');
      wrapper.style.cssText = 'position:absolute;left:-9999px;top:0;width:1600px;background:#fff;padding:0;';
      document.body.appendChild(wrapper);

      // Branded header
      if (branded) {
        var header = document.createElement('div');
        header.style.cssText = 'padding:32px 40px 16px;display:flex;align-items:center;gap:16px;';
        var logo = document.createElement('img');
        logo.src = IRC.IRC_LOGO_DATA_URI;
        logo.style.cssText = 'width:48px;height:48px;';
        header.appendChild(logo);
        var titleEl = document.createElement('div');
        titleEl.style.cssText = 'font-size:24px;font-weight:600;color:#1a1a1a;';
        titleEl.textContent = title;
        header.appendChild(titleEl);
        wrapper.appendChild(header);
        var sep = document.createElement('div');
        sep.style.cssText = 'height:1px;background:#e5e5e5;margin:0 40px;';
        wrapper.appendChild(sep);
      }

      // Clone map container for export
      var mapContainer = document.getElementById('maps-container');
      var mapClone = document.createElement('div');
      mapClone.style.cssText = 'width:1600px;height:800px;background:#f7f7f7;position:relative;';

      // Create a temporary export map
      var exportMap = L.map(mapClone, {
        center: map.getCenter(),
        zoom: map.getZoom(),
        minZoom: 2,
        maxZoom: 7,
        zoomControl: false,
        attributionControl: false,
        preferCanvas: true,
        dragging: false,
        touchZoom: false,
        scrollWheelZoom: false,
        doubleClickZoom: false
      });

      // Add GeoJSON layer only (no tiles for clean export)
      var exportFiltered = getFilteredClassifications();
      var exportByCountry = getCountryMap(exportFiltered);

      L.geoJSON(geoData, {
        style: function(feature) {
          var name = feature.properties.name;
          var items = matchGeoToClassification(name, exportByCountry);
          if (!items) return { fillColor: '#f0f0f0', fillOpacity: 0.3, color: '#ccc', weight: 0.5, opacity: 0.6 };
          var fillColor;
          if (displayMode === 'severity') {
            var totalSev = 0, sevCount = 0;
            items.forEach(function(c) {
              if (c.severity !== null && c.severity !== undefined) { totalSev += Number(c.severity); sevCount++; }
            });
            fillColor = getSeverityColor(sevCount > 0 ? totalSev / sevCount : 0);
          } else {
            fillColor = stanceColor(getHighestStance(items));
          }
          return { fillColor: fillColor, fillOpacity: 0.7, color: '#999', weight: 0.5, opacity: 0.6 };
        }
      }).addTo(exportMap);

      wrapper.appendChild(mapClone);

      // Legend clone
      var legendClone = document.getElementById('maps-legend').cloneNode(true);
      legendClone.style.cssText = 'padding:12px 40px;display:flex;align-items:center;gap:16px;flex-wrap:wrap;';
      wrapper.appendChild(legendClone);

      // Branded footer
      if (branded) {
        var footer = document.createElement('div');
        var today = new Date().toISOString().split('T')[0];
        footer.style.cssText = 'padding:12px 40px 24px;font-size:12px;color:#999;border-top:1px solid #e5e5e5;margin-top:8px;';
        footer.textContent = 'Generated ' + today + ' | IRC Emergency Classification System | ' + filtered.length + ' classifications shown';
        wrapper.appendChild(footer);
      }

      // Wait for export map to render, then capture
      setTimeout(function() {
        html2canvas(wrapper, { scale: 2, useCORS: true, backgroundColor: '#ffffff' }).then(function(canvas) {
          var link = document.createElement('a');
          var today = new Date().toISOString().split('T')[0];
          link.download = 'irc-classification-map-' + today + '.png';
          link.href = canvas.toDataURL('image/png');
          link.click();
        }).catch(function(err) {
          console.error('Export failed:', err);
          // Fallback: manually draw onto canvas
          fallbackExport(wrapper, exportByCountry, filtered, branded, title);
        }).finally(function() {
          exportMap.remove();
          document.body.removeChild(wrapper);
          btn.disabled = false;
          btn.textContent = 'Export PNG';
        });
      }, 500);
    });

    function fallbackExport(wrapper, byCountry, filtered, branded, title) {
      var canvas = document.createElement('canvas');
      canvas.width = 3200;
      canvas.height = 1800;
      var ctx = canvas.getContext('2d');
      ctx.fillStyle = '#ffffff';
      ctx.fillRect(0, 0, 3200, 1800);
      ctx.fillStyle = '#1a1a1a';
      ctx.font = '32px sans-serif';
      ctx.fillText(title, 80, 80);

      // Draw each country from GeoJSON
      if (geoData && geoData.features) {
        geoData.features.forEach(function(feature) {
          var name = feature.properties.name;
          var items = matchGeoToClassification(name, byCountry);
          var fillColor = '#f0f0f0';
          if (items) {
            if (displayMode === 'severity') {
              var totalSev = 0, sevCount = 0;
              items.forEach(function(c) {
                if (c.severity !== null && c.severity !== undefined) { totalSev += Number(c.severity); sevCount++; }
              });
              fillColor = getSeverityColor(sevCount > 0 ? totalSev / sevCount : 0);
            } else {
              fillColor = stanceColor(getHighestStance(items));
            }
          }

          ctx.fillStyle = fillColor;
          ctx.strokeStyle = '#999';
          ctx.lineWidth = 0.5;

          var geom = feature.geometry;
          var polys = geom.type === 'MultiPolygon' ? geom.coordinates : [geom.coordinates];
          polys.forEach(function(poly) {
            poly.forEach(function(ring) {
              ctx.beginPath();
              ring.forEach(function(coord, i) {
                // Simple equirectangular projection
                var x = (coord[0] + 180) / 360 * 2800 + 200;
                var y = (90 - coord[1]) / 180 * 1400 + 150;
                if (i === 0) ctx.moveTo(x, y);
                else ctx.lineTo(x, y);
              });
              ctx.closePath();
              ctx.fill();
              ctx.stroke();
            });
          });
        });
      }

      // Footer
      if (branded) {
        ctx.fillStyle = '#999';
        ctx.font = '24px sans-serif';
        var today = new Date().toISOString().split('T')[0];
        ctx.fillText('Generated ' + today + ' | IRC Emergency Classification System | ' + filtered.length + ' classifications shown', 80, 1740);
      }

      var link = document.createElement('a');
      var today = new Date().toISOString().split('T')[0];
      link.download = 'irc-classification-map-' + today + '.png';
      link.href = canvas.toDataURL('image/png');
      link.click();
    }

    // ── Init ──
    initMap();
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Maps — IRC Emergency Classification</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <style>
    /* ── Full-width layout: toolbar above, map below ── */
    .maps-layout {
      display: flex;
      flex-direction: column;
      min-height: calc(100vh - 180px);
    }

    /* ── Filter toolbar (horizontal, above map) ── */
    .maps-toolbar {
      background: #fff;
      border-bottom: 1px solid #e5e5e5;
      padding: 12px 20px;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 16px;
    }
    .maps-toolbar .filter-group {
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .maps-toolbar .filter-label {
      font-size: 0.68rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      color: #999;
      white-space: nowrap;
    }
    .toolbar-sep {
      width: 1px;
      height: 24px;
      background: #e5e5e5;
      flex-shrink: 0;
    }
    .toolbar-summary {
      font-size: 0.78rem;
      color: #666;
      margin-left: auto;
      white-space: nowrap;
    }

    /* ── Title bar ── */
    .maps-title-bar {
      padding: 10px 20px;
      background: #fff;
      border-bottom: 1px solid #e5e5e5;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .maps-title {
      font-size: 1.1rem;
      font-weight: 600;
      color: #1a1a1a;
      margin: 0;
      cursor: pointer;
      padding: 3px 8px;
      border-radius: 6px;
      border: 1px solid transparent;
      transition: border-color 0.2s;
      flex: 1;
    }
    .maps-title:hover { border-color: #ddd; }
    .maps-title:focus { outline: none; border-color: #FFC72C; background: #FFFDF5; }
    .maps-title-hint {
      font-size: 0.7rem;
      color: #bbb;
    }

    /* ── Map container (fills remaining height) ── */
    .maps-main {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-height: 0;
    }
    #maps-container {
      flex: 1;
      min-height: 340px;
      background: #f0f0f0;
    }

    /* ── Bottom bar: legend + export + AI builder ── */
    .maps-bottom-bar {
      background: #fff;
      border-top: 1px solid #e5e5e5;
      padding: 10px 20px;
      display: flex;
      align-items: center;
      gap: 20px;
      flex-wrap: wrap;
    }
    .maps-legend {
      display: flex;
      align-items: center;
      gap: 14px;
      flex-wrap: wrap;
    }
    .legend-item {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 0.78rem;
      color: #555;
    }
    .legend-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      border: 1px solid rgba(0,0,0,0.15);
    }
    .legend-gradient-bar {
      width: 160px;
      height: 12px;
      border-radius: 3px;
      border: 1px solid #ddd;
    }
    .legend-gradient-labels {
      display: flex;
      justify-content: space-between;
      width: 160px;
      font-size: 0.65rem;
      color: #888;
    }
    .bottom-sep {
      width: 1px;
      height: 24px;
      background: #e5e5e5;
      flex-shrink: 0;
    }
    .bottom-export {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .export-checkbox {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 0.75rem;
      color: #555;
      cursor: pointer;
      white-space: nowrap;
    }
    .export-checkbox input { accent-color: #1a1a1a; }
    .export-btn {
      padding: 6px 14px;
      border-radius: 6px;
      border: none;
      background: #1a1a1a;
      color: #fff;
      font-size: 0.78rem;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s;
      font-family: inherit;
      white-space: nowrap;
    }
    .export-btn:hover { background: #333; }
    .export-btn:disabled { background: #ccc; cursor: not-allowed; }

    /* ── AI builder (inline in bottom bar) ── */
    .ai-builder-inline {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-left: auto;
    }
    .ai-builder-inline .ai-sparkle { font-size: 0.85rem; }
    .ai-builder-inline input {
      width: 280px;
      padding: 6px 10px;
      border: 1px solid #ddd;
      border-radius: 6px;
      font-size: 0.78rem;
      font-family: inherit;
      color: #333;
    }
    .ai-builder-inline input:focus {
      outline: none;
      border-color: #FFC72C;
      box-shadow: 0 0 0 2px rgba(255,199,44,0.15);
    }
    .ai-builder-inline input::placeholder { color: #aaa; }

    /* ── Shared control styles ── */
    .filter-pill {
      padding: 4px 10px;
      border-radius: 16px;
      border: 1px solid #ddd;
      background: #fff;
      font-size: 0.75rem;
      cursor: pointer;
      transition: all 0.15s;
      color: #555;
      font-family: inherit;
    }
    .filter-pill:hover { border-color: #bbb; background: #f9f9f9; }
    .filter-pill.active { background: #1a1a1a; color: #fff; border-color: #1a1a1a; }
    .toggle-btn {
      padding: 4px 8px;
      border-radius: 5px;
      border: 1px solid #ddd;
      background: #fff;
      font-size: 0.73rem;
      cursor: pointer;
      transition: all 0.15s;
      color: #555;
      display: inline-flex;
      align-items: center;
      gap: 4px;
      font-family: inherit;
    }
    .toggle-btn:hover { border-color: #bbb; }
    .toggle-btn.active { background: #f0f0f0; border-color: #999; color: #1a1a1a; font-weight: 500; }
    .toggle-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      border: 1px solid rgba(0,0,0,0.15);
    }
    .filter-select {
      padding: 4px 8px;
      border-radius: 5px;
      border: 1px solid #ddd;
      font-size: 0.75rem;
      font-family: inherit;
      background: #fff;
      color: #333;
      cursor: pointer;
    }
    .radio-group {
      display: flex;
      gap: 10px;
    }
    .radio-item {
      display: flex;
      align-items: center;
      gap: 4px;
      font-size: 0.75rem;
      color: #555;
      cursor: pointer;
    }
    .radio-item input[type="radio"] { accent-color: #1a1a1a; }
    .pill-group {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
    }

    /* AI builder go button */
    .ai-builder-go {
      padding: 6px 14px;
      border-radius: 6px;
      border: 1px solid #FFC72C;
      background: #FFFDF5;
      color: #1a1a1a;
      font-size: 0.78rem;
      font-weight: 500;
      cursor: pointer;
      font-family: inherit;
      transition: all 0.15s;
      white-space: nowrap;
    }
    .ai-builder-go:hover { background: #FFC72C; }
    .ai-builder-go:disabled { opacity: 0.5; cursor: not-allowed; }
    .ai-builder-status {
      font-size: 0.7rem;
      color: #888;
    }
    .ai-builder-status.error { color: #E52911; }

    /* Filter chip */
    .ai-filter-chip {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 3px 9px;
      border-radius: 14px;
      background: #FFF8E1;
      border: 1px solid #FFC72C;
      font-size: 0.73rem;
      color: #1a1a1a;
    }
    .ai-filter-chip-x {
      cursor: pointer;
      font-weight: bold;
      color: #999;
      font-size: 0.85rem;
      line-height: 1;
    }
    .ai-filter-chip-x:hover { color: #E52911; }

    /* Map tooltip styles (same as dashboard) */
    .map-country-tooltip {
      background: #fff;
      border: 1px solid #ddd;
      border-radius: 8px;
      padding: 8px 12px;
      font-size: 0.8rem;
      box-shadow: 0 2px 8px rgba(0,0,0,0.12);
      max-width: 220px;
    }
    .map-country-tooltip .leaflet-tooltip-content {
      margin: 0;
    }
    .map-tip-name {
      font-weight: 600;
      color: #1a1a1a;
      margin-bottom: 4px;
    }
    .map-tip-row {
      display: flex;
      align-items: center;
      gap: 6px;
      flex-wrap: wrap;
    }
    .map-tip-stance {
      display: inline-block;
      padding: 1px 8px;
      border-radius: 10px;
      font-size: 0.7rem;
      font-weight: 600;
    }
    .map-tip-type {
      width: 16px;
      height: 16px;
      display: inline-flex;
      color: #666;
    }
    .map-tip-type svg {
      width: 100%;
      height: 100%;
    }
    .map-tip-count {
      font-size: 0.7rem;
      color: #888;
      margin-top: 2px;
    }
    .map-popup-title {
      font-weight: 600;
      font-size: 0.95rem;
      margin-bottom: 6px;
    }
    .map-popup-stance {
      display: inline-block;
      padding: 2px 10px;
      border-radius: 10px;
      font-size: 0.75rem;
      font-weight: 600;
      margin-bottom: 4px;
    }
    .map-popup-detail {
      font-size: 0.78rem;
      color: #666;
      margin: 2px 0;
    }
    .map-popup-multi {
      border-top: 1px solid #eee;
      margin: 8px 0;
    }
    .map-popup-link {
      display: inline-block;
      margin-top: 4px;
      font-size: 0.75rem;
      color: #2563eb;
      text-decoration: none;
    }

    @media (max-width: 768px) {
      .maps-toolbar {
        gap: 8px;
        padding: 8px 12px;
      }
      .toolbar-sep { display: none; }
      .ai-builder-inline { width: 100%; margin-left: 0; }
      .ai-builder-inline input { flex: 1; width: auto; }
      .maps-bottom-bar { flex-direction: column; align-items: flex-start; gap: 10px; }
      #maps-container { min-height: 300px; }
    }
  </style>
</head>
<body>
  <div id="header-mount"></div>
  <main>
    <div id="nav-mount"></div>
    <div class="maps-layout">
      <!-- Filter toolbar (horizontal, above map) -->
      <div class="maps-toolbar">
        <div class="filter-group">
          <span class="filter-label">Time</span>
          <div class="pill-group" id="time-pills">
            <button class="filter-pill active" data-period="all">All time</button>
            <button class="filter-pill" data-period="fy" id="fy-pill">FY26</button>
            <button class="filter-pill" data-period="12m">Last 12 mo</button>
          </div>
        </div>
        <span class="toolbar-sep"></span>
        <div class="filter-group">
          <span class="filter-label">Type</span>
          <div class="pill-group" id="type-toggles">
            <button class="toggle-btn" data-type="conflict">Conflict</button>
            <button class="toggle-btn" data-type="outbreak">Outbreak</button>
            <button class="toggle-btn" data-type="food">Food</button>
            <button class="toggle-btn" data-type="hazard">Hazard</button>
            <button class="toggle-btn" data-type="complex">Complex</button>
          </div>
        </div>
        <span class="toolbar-sep"></span>
        <div class="filter-group">
          <span class="filter-label">Stance</span>
          <div class="pill-group" id="stance-toggles">
            <button class="toggle-btn" data-stance="red"><span class="toggle-dot" style="background:#E52911;"></span> Red</button>
            <button class="toggle-btn" data-stance="orange"><span class="toggle-dot" style="background:#F58220;"></span> Orange</button>
            <button class="toggle-btn" data-stance="yellow"><span class="toggle-dot" style="background:#FFC72C;"></span> Yellow</button>
            <button class="toggle-btn" data-stance="white"><span class="toggle-dot" style="background:#E9E9E9;"></span> White</button>
          </div>
        </div>
        <span class="toolbar-sep"></span>
        <div class="filter-group">
          <span class="filter-label">Region</span>
          <select class="filter-select" id="region-select">
            <option value="all">All</option>
            <option value="asia">Asia</option>
            <option value="east africa">East Africa</option>
            <option value="latam">LatAm</option>
            <option value="mena">MENA</option>
            <option value="rai">RAI</option>
            <option value="west and central africa">W&C Africa</option>
          </select>
        </div>
        <span class="toolbar-sep"></span>
        <div class="filter-group">
          <span class="filter-label">Display</span>
          <div class="radio-group">
            <label class="radio-item"><input type="radio" name="display-mode" value="stance" checked> Stance</label>
            <label class="radio-item"><input type="radio" name="display-mode" value="severity"> Severity</label>
          </div>
        </div>
        <span class="toolbar-sep"></span>
        <div class="filter-group">
          <span class="filter-label">Status</span>
          <div class="pill-group" id="status-pills">
            <button class="filter-pill active" data-status="active">Active</button>
            <button class="filter-pill" data-status="all">All</button>
          </div>
        </div>
        <span id="ai-filter-chip-wrap"></span>
        <span class="toolbar-summary" id="filter-summary">0 shown</span>
      </div>

      <!-- Title bar -->
      <div class="maps-title-bar">
        <h2 class="maps-title" id="map-title" contenteditable="true" spellcheck="false">Active Classifications</h2>
        <span class="maps-title-hint">Click to edit</span>
      </div>

      <!-- Map (full width, landscape) -->
      <div class="maps-main">
        <div id="maps-container"></div>
      </div>

      <!-- Bottom bar: legend + export + AI builder -->
      <div class="maps-bottom-bar">
        <div class="maps-legend" id="maps-legend"></div>
        <span class="bottom-sep"></span>
        <div class="bottom-export">
          <label class="export-checkbox"><input type="checkbox" id="branding-toggle" checked> Branded</label>
          <button class="export-btn" id="export-btn">PNG</button>
          <button class="export-btn" id="export-svg-btn" style="background:#fff;color:#1a1a1a;border:1px solid #1a1a1a;">SVG</button>
        </div>
        <span class="bottom-sep"></span>
        <div class="ai-builder-inline">
          <span class="ai-sparkle">&#10024;</span>
          <input type="text" id="ai-builder-input" placeholder="Describe a map, e.g. &quot;red conflicts in East Africa last 12 months&quot;">
          <button class="ai-builder-go" id="ai-builder-go">Build</button>
          <span class="ai-builder-status" id="ai-builder-status"></span>
        </div>
      </div>
    </div>
  </main>
  <div id="footer-mount"></div>

  <script src="irc-shared.iife.js"></script>
  <script src="supabase.js"></script>
  <script src="shared.js"></script>
  <script>
    // Render shared chrome
    document.getElementById('header-mount').innerHTML = IRC.renderHeader('maps');
    document.getElementById('nav-mount').innerHTML = IRC.renderNav();
    document.getElementById('footer-mount').innerHTML = IRC.renderFooter();

    // ── State ──
    var classifications = IRC.getClassifications();
    var timePeriod = 'all';
    var statusFilter = 'active';
    var selectedTypes = [];    // empty = all
    var selectedStances = [];  // empty = all
    var regionFilter = 'all';
    var displayMode = 'stance';
    var titleEdited = false;
    var countryFilter = [];    // empty = all; set by AI builder

    // Continent → country name mappings (used by AI builder for geographic queries)
    var CONTINENT_COUNTRIES = {
      africa: ['Algeria','Angola','Benin','Botswana','Burkina Faso','Burundi','Cameroon','Cape Verde','Central African Republic','Chad','Comoros','Congo','Democratic Republic of the Congo','Djibouti','Egypt','Equatorial Guinea','Eritrea','Eswatini','Ethiopia','Gabon','Gambia','Ghana','Guinea','Guinea-Bissau','Ivory Coast','Kenya','Lesotho','Liberia','Libya','Madagascar','Malawi','Mali','Mauritania','Mauritius','Morocco','Mozambique','Namibia','Niger','Nigeria','Rwanda','Senegal','Sierra Leone','Somalia','South Africa','South Sudan','Sudan','Tanzania','Togo','Tunisia','Uganda','Zambia','Zimbabwe'],
      asia: ['Afghanistan','Bangladesh','Bhutan','Brunei','Cambodia','China','India','Indonesia','Iran (Islamic Republic of)','Iraq','Japan','Kazakhstan','Kyrgyzstan','Lao PDR','Malaysia','Maldives','Mongolia','Myanmar','Nepal','North Korea','Pakistan','Philippines','South Korea','Sri Lanka','Tajikistan','Thailand','Timor-Leste','Turkmenistan','Uzbekistan','Viet Nam'],
      europe: ['Albania','Armenia','Austria','Azerbaijan','Belarus','Belgium','Bosnia and Herzegovina','Bulgaria','Croatia','Cyprus','Czech Republic','Denmark','Estonia','Finland','France','Georgia','Germany','Greece','Hungary','Iceland','Ireland','Italy','Kosovo','Latvia','Lithuania','Luxembourg','Moldova (Republic of)','Montenegro','Netherlands','North Macedonia','Norway','Poland','Portugal','Romania','Russia','Serbia','Slovakia','Slovenia','Spain','Sweden','Switzerland','Turkey','Ukraine','United Kingdom'],
      americas: ['Argentina','Belize','Bolivia','Brazil','Canada','Chile','Colombia','Costa Rica','Cuba','Dominican Republic','Ecuador','El Salvador','Guatemala','Haiti','Honduras','Jamaica','Mexico','Nicaragua','Panama','Paraguay','Peru','Trinidad and Tobago','United States','Uruguay','Venezuela (Bolivarian Republic of)'],
      middleeast: ['Bahrain','Iran (Islamic Republic of)','Iraq','Israel','Jordan','Kuwait','Lebanon','Oman','State of Palestine','Qatar','Saudi Arabia','Syrian Arab Republic','Turkey','United Arab Emirates','Yemen']
    };

    // Fiscal year
    var now = new Date();
    var currentFY = now.getMonth() >= 9 ? now.getFullYear() + 1 : now.getFullYear();
    var fyLabel = 'FY' + String(currentFY).slice(-2);
    var fyStart = new Date(currentFY - 1, 9, 1);
    var fyEnd = new Date(currentFY, 8, 30, 23, 59, 59);
    document.getElementById('fy-pill').textContent = fyLabel;

    // ── Async load from Supabase ──
    IRC.db.migrateFromLocalStorage().then(function() {
      return IRC.db.load();
    }).then(function(data) {
      classifications = data;
      applyFilters();
    });

    // ── GEO alias maps ──
    var GEO_TO_CLASS = {
      'Republic of the Congo': 'Congo',
      'United Republic of Tanzania': 'Tanzania',
      'eSwatini': 'Eswatini',
      'Côte d\'Ivoire': 'Ivory Coast',
      'Republic of Serbia': 'Serbia',
      'The Bahamas': 'Bahamas',
      'Somaliland': 'Somalia',
      'Republic of Korea': 'South Korea',
      'Dem. Rep. Korea': 'North Korea',
      'Timor-Leste': 'East Timor',
      'Lao PDR': 'Laos',
      'Iran': 'Iran (Islamic Republic of)',
      'Syria': 'Syrian Arab Republic',
      'Palestine': 'State of Palestine',
      'Moldova': 'Moldova (Republic of)',
      'Venezuela': 'Venezuela (Bolivarian Republic of)',
      'Vietnam': 'Viet Nam',
      'Tanzania': 'United Republic of Tanzania',
      'Democratic Republic of the Congo': 'Democratic Republic of the Congo'
    };
    var CLASS_TO_GEO = {};
    Object.keys(GEO_TO_CLASS).forEach(function(k) { CLASS_TO_GEO[GEO_TO_CLASS[k]] = k; });

    // ── Type icons (same as dashboard) ──
    var typeIcons = {
      'conflict': '<svg viewBox="0 0 512 512" fill="currentColor" xmlns="http://www.w3.org/2000/svg"><path d="m58 308.5c-15.439 0-28 12.561-28 28 0 6.763 2.41 12.973 6.417 17.818.058.074 59.793 70.911 59.986 71.096 9.632 11.068 23.806 18.086 39.597 18.086h240c15.798 0 29.977-7.024 39.61-18.102.188-.181 59.915-71.007 59.973-71.081 4.007-4.844 6.417-11.054 6.417-17.817 0-15.439-12.561-28-28-28zm0 15c7.168 0 13 5.832 13 13s-5.832 13-13 13-13-5.832-13-13 5.832-13 13-13zm40.5 67.5c0-20.678 16.822-37.5 37.5-37.5s37.5 16.822 37.5 37.5-16.822 37.5-37.5 37.5-37.5-16.822-37.5-37.5zm120 0c0-20.678 16.822-37.5 37.5-37.5s37.5 16.822 37.5 37.5-16.822 37.5-37.5 37.5-37.5-16.822-37.5-37.5z"/></svg>',

    };

    // ── Region bounds ──
    var REGION_BOUNDS = {
      all: null,
      asia: [[-10, 60], [45, 145]],
      'east africa': [[-15, 25], [20, 55]],
      latam: [[-55, -120], [30, -30]],
      mena: [[10, -15], [45, 65]],
      rai: [[-35, -20], [40, 55]],
      'west and central africa': [[-5, -20], [25, 20]]
    };

    // ── Core functions ──
    function getLatestPerClassification(list) {
      var grouped = {};
      list.forEach(function(c) {
        var key = c.classificationId || c.id;
        var num = c.reclassificationNumber || 1;
        if (!grouped[key] || num > (grouped[key].reclassificationNumber || 1)) {
          grouped[key] = c;
        }
      });
      return Object.keys(grouped).map(function(k) { return grouped[k]; });
    }

    function getHighestStance(items) {
      var order = { red: 3, orange: 2, yellow: 1, white: 0 };
      var highest = 'white';
      items.forEach(function(c) {
        var s = (c.stance || 'white').toLowerCase();
        if ((order[s] || 0) > (order[highest] || 0)) highest = s;
      });
      return highest;
    }

    function stanceColor(stance) {
      return IRC.STANCE_COLORS[stance] || '#E9E9E9';
    }

    function matchGeoToClassification(geoName, byCountry) {
      if (byCountry[geoName]) return byCountry[geoName];
      var aliasName = GEO_TO_CLASS[geoName];
      if (aliasName && byCountry[aliasName]) return byCountry[aliasName];
      var lowerGeo = geoName.toLowerCase();
      var keys = Object.keys(byCountry);
      for (var i = 0; i < keys.length; i++) {
        if (keys[i].toLowerCase() === lowerGeo) return byCountry[keys[i]];
      }
      for (var j = 0; j < keys.length; j++) {
        if (keys[j].toLowerCase().indexOf(lowerGeo) === 0) return byCountry[keys[j]];
      }
      return null;
    }

    function getSeverityColor(avgSeverity) {
      if (avgSeverity === null || avgSeverity === undefined || avgSeverity === 0) return '#E9E9E9';
      if (avgSeverity <= 3) {
        var t = (avgSeverity - 1) / 2;
        return lerpColor('#FFF4CC', '#FFC72C', Math.max(0, t));
      }
      if (avgSeverity <= 6) {
        var t2 = (avgSeverity - 3) / 3;
        return lerpColor('#FFC72C', '#F58220', t2);
      }
      var t3 = (avgSeverity - 6) / 4;
      return lerpColor('#F58220', '#E52911', Math.min(1, t3));
    }

    function lerpColor(a, b, t) {
      var ar = parseInt(a.slice(1,3), 16), ag = parseInt(a.slice(3,5), 16), ab = parseInt(a.slice(5,7), 16);
      var br = parseInt(b.slice(1,3), 16), bg = parseInt(b.slice(3,5), 16), bb = parseInt(b.slice(5,7), 16);
      var rr = Math.round(ar + (br - ar) * t);
      var rg = Math.round(ag + (bg - ag) * t);
      var rb = Math.round(ab + (bb - ab) * t);
      return '#' + ((1 << 24) + (rr << 16) + (rg << 8) + rb).toString(16).slice(1);
    }

    // ── Filter logic ──
    function getFilteredClassifications() {
      var latest = getLatestPerClassification(classifications);
      var filtered = latest.filter(function(c) {
        // Status filter
        if (statusFilter === 'active' && IRC.isExpired(c.expirationDate)) return false;

        // Time period filter
        if (timePeriod === 'fy') {
          var d = new Date(c.date);
          if (d < fyStart || d > fyEnd) return false;
        } else if (timePeriod === '12m') {
          var twelveAgo = new Date();
          twelveAgo.setFullYear(twelveAgo.getFullYear() - 1);
          if (new Date(c.date) < twelveAgo) return false;
        }

        // Type filter (multi-select; empty = all)
        if (selectedTypes.length > 0 && selectedTypes.indexOf(c.type) === -1) return false;

        // Stance filter (multi-select; empty = all)
        if (selectedStances.length > 0) {
          var s = (c.stance || 'white').toLowerCase();
          if (selectedStances.indexOf(s) === -1) return false;
        }

        // Country filter (set by AI builder; empty = all)
        if (countryFilter.length > 0 && c.country) {
          var normCountry = IRC.normalizeCountry(c.country).toLowerCase();
          var match = false;
          for (var ci = 0; ci < countryFilter.length; ci++) {
            if (countryFilter[ci].toLowerCase() === normCountry) { match = true; break; }
          }
          if (!match) return false;
        }

        return true;
      });

      return filtered;
    }

    function getCountryMap(filtered) {
      var byCountry = {};
      filtered.forEach(function(c) {
        if (!c.country) return;
        var name = IRC.normalizeCountry(c.country);
        if (!byCountry[name]) byCountry[name] = [];
        byCountry[name].push(c);
      });
      return byCountry;
    }

    // ── Title generation ──
    function generateTitle() {
      if (titleEdited) return;
      var parts = [];

      // Status
      if (statusFilter === 'active') parts.push('Active');

      // Stances
      if (selectedStances.length > 0 && selectedStances.length < 4) {
        var stanceLabels = selectedStances.map(function(s) {
          return s.charAt(0).toUpperCase() + s.slice(1);
        });
        parts.push(stanceLabels.join(' & '));
      }

      // Types
      if (selectedTypes.length > 0 && selectedTypes.length <= 3) {
        var typeLabels = selectedTypes.map(function(t) {
          return (IRC.TYPE_LABELS[t] || t);
        });
        parts.push(typeLabels.join(' & '));
      }

      parts.push('Classifications');

      // Time suffix
      var timeSuffix = '';
      if (timePeriod === 'fy') timeSuffix = ' \u2014 ' + fyLabel;
      else if (timePeriod === '12m') timeSuffix = ' \u2014 Last 12 Months';

      document.getElementById('map-title').textContent = parts.join(' ') + timeSuffix;
    }

    // Title edit tracking
    document.getElementById('map-title').addEventListener('input', function() {
      titleEdited = true;
    });
    document.getElementById('map-title').addEventListener('keydown', function(e) {
      if (e.key === 'Enter') {
        e.preventDefault();
        this.blur();
      }
    });

    // ── Leaflet map ──
    var map = null;
    var geoLayer = null;
    var geoData = null;

    function initMap() {
      map = L.map('maps-container', {
        center: [15, 20],
        zoom: 2,
        minZoom: 2,
        maxZoom: 7,
        worldCopyJump: true,
        zoomControl: true,
        attributionControl: false,
        preferCanvas: true
      });

      L.tileLayer('https://{s}.basemaps.cartocdn.com/light_nolabels/{z}/{x}/{y}{r}.png', {
        subdomains: 'abcd',
        maxZoom: 19
      }).addTo(map);

      L.tileLayer('https://{s}.basemaps.cartocdn.com/light_only_labels/{z}/{x}/{y}{r}.png', {
        subdomains: 'abcd',
        maxZoom: 19,
        pane: 'overlayPane'
      }).addTo(map);

      // Ensure Leaflet measures the full-width container correctly
      setTimeout(function() { map.invalidateSize(); }, 100);

      fetch('countries-simplified.json')
        .then(function(res) { return res.json(); })
        .then(function(data) {
          geoData = data;
          map.invalidateSize();
          applyFilters();
        })
        .catch(function(err) {
          console.warn('Failed to load map data:', err);
          document.getElementById('maps-container').innerHTML =
            '<div style="display:flex;align-items:center;justify-content:center;height:100%;color:#666;">Map data unavailable</div>';
        });
    }

    function renderMapLayer() {
      if (!map || !geoData) return;
      if (geoLayer) map.removeLayer(geoLayer);

      var filtered = getFilteredClassifications();
      var byCountry = getCountryMap(filtered);

      // Update summary
      document.getElementById('filter-summary').textContent = filtered.length + ' shown';

      geoLayer = L.geoJSON(geoData, {
        style: function(feature) {
          var name = feature.properties.name;
          var items = matchGeoToClassification(name, byCountry);

          if (!items) {
            return { fillColor: '#f0f0f0', fillOpacity: 0.15, color: '#999', weight: 0.5, opacity: 0.6 };
          }

          var fillColor, fillOpacity = 0.7;
          if (displayMode === 'severity') {
            var totalSev = 0, sevCount = 0;
            items.forEach(function(c) {
              if (c.severity !== null && c.severity !== undefined) {
                totalSev += Number(c.severity);
                sevCount++;
              }
            });
            var avgSev = sevCount > 0 ? totalSev / sevCount : 0;
            fillColor = getSeverityColor(avgSev);
          } else {
            var stance = getHighestStance(items);
            fillColor = stanceColor(stance);
          }

          return { fillColor: fillColor, fillOpacity: fillOpacity, color: '#999', weight: 0.5, opacity: 0.6 };
        },
        onEachFeature: function(feature, layer) {
          var name = feature.properties.name;
          var items = matchGeoToClassification(name, byCountry);
          var displayName = items ? (items[0].country || name) : name;

          // Tooltip
          var tipHtml = '<div class="map-tip-name">' + displayName + '</div>';
          if (items) {
            var topStance = getHighestStance(items);
            var stanceLabel = topStance.charAt(0).toUpperCase() + topStance.slice(1);
            var color = stanceColor(topStance);
            var isRed = topStance === 'red';

            var seenTypes = {};
            items.forEach(function(c) { if (c.type) seenTypes[c.type] = true; });
            var typeIconsHtml = Object.keys(seenTypes).map(function(t) {
              var icon = typeIcons[t];
              return icon ? '<span class="map-tip-type">' + icon + '</span>' : '';
            }).join('');

            tipHtml += '<div class="map-tip-row">';
            tipHtml += '<span class="map-tip-stance" style="background:' + color + ';color:' + (isRed ? '#fff' : '#000') + ';">' + stanceLabel + '</span>';
            tipHtml += typeIconsHtml;
            tipHtml += '</div>';

            if (displayMode === 'severity') {
              var totalSev = 0, sevCount = 0;
              items.forEach(function(c) {
                if (c.severity !== null && c.severity !== undefined) { totalSev += Number(c.severity); sevCount++; }
              });
              if (sevCount > 0) {
                tipHtml += '<div class="map-tip-count">Avg severity: ' + (totalSev / sevCount).toFixed(1) + '</div>';
              }
            }

            if (items.length > 1) {
              tipHtml += '<div class="map-tip-count">' + items.length + ' classifications</div>';
            }
          }
          layer.bindTooltip(tipHtml, { sticky: true, direction: 'top', offset: [0, -10], className: 'map-country-tooltip' });

          // Hover highlight
          layer.on('mouseover', function() {
            this.setStyle({ weight: 2, color: '#333', fillOpacity: items ? 0.85 : 0.3 });
            this.bringToFront();
          });
          layer.on('mouseout', function() {
            geoLayer.resetStyle(this);
          });

          // Popup for countries with data
          if (items) {
            var popupHtml = '<div class="map-popup-title">' + displayName + '</div>';
            items.forEach(function(c, idx) {
              if (idx > 0) popupHtml += '<div class="map-popup-multi"></div>';
              var stance = c.stance ? c.stance.charAt(0).toUpperCase() + c.stance.slice(1) : 'White';
              var sc = stanceColor(c.stance);
              var isR = c.stance === 'red';
              var sev = (c.severity !== null && c.severity !== undefined) ? ' ' + c.severity : '';
              popupHtml += '<span class="map-popup-stance" style="background:' + sc + ';color:' + (isR ? '#fff' : '#000') + ';">' + stance + sev + '</span>';
              if (c.emergencyName) popupHtml += '<div class="map-popup-detail">' + c.emergencyName + '</div>';
              if (c.type) popupHtml += '<div class="map-popup-detail">Type: ' + (IRC.TYPE_LABELS[c.type] || c.type) + '</div>';
              if (c.date) popupHtml += '<div class="map-popup-detail">Date: ' + IRC.formatDate(c.date) + '</div>';
              var daysLeft = IRC.daysUntilExpiration(c.expirationDate);
              if (daysLeft !== null) {
                if (daysLeft < 0) popupHtml += '<div class="map-popup-detail" style="color:#E52911;">Expired</div>';
                else if (daysLeft <= 7) popupHtml += '<div class="map-popup-detail" style="color:#F58220;">' + daysLeft + ' days until expiry</div>';
              }
              popupHtml += '<a class="map-popup-link" href="classify.html?view=' + encodeURIComponent(c.id) + '">View details &rarr;</a>';
            });
            layer.bindPopup(popupHtml, { maxWidth: 280, className: 'map-classification-popup' });
          }
        }
      }).addTo(map);
    }

    function renderLegend() {
      var legendEl = document.getElementById('maps-legend');
      if (displayMode === 'severity') {
        legendEl.innerHTML =
          '<span style="font-size:0.8rem;color:#555;font-weight:500;">Severity</span>' +
          '<div style="display:flex;flex-direction:column;gap:2px;">' +
            '<div class="legend-gradient-bar" style="background:linear-gradient(to right, #FFF4CC, #FFC72C, #F58220, #E52911);"></div>' +
            '<div class="legend-gradient-labels"><span>0</span><span>3</span><span>6</span><span>10</span></div>' +
          '</div>';
      } else {
        var stances = [
          { label: 'Red', color: '#E52911' },
          { label: 'Orange', color: '#F58220' },
          { label: 'Yellow', color: '#FFC72C' },
          { label: 'White', color: '#E9E9E9' }
        ];
        legendEl.innerHTML = stances.map(function(s) {
          return '<div class="legend-item"><span class="legend-dot" style="background:' + s.color + ';"></span>' + s.label + '</div>';
        }).join('');
      }
    }

    // ── Compute bounding box of matched (shaded) countries ──
    function getMatchedBounds(byCountry) {
      if (!geoData || !geoData.features) return null;
      var minLat = 90, maxLat = -90, minLng = 180, maxLng = -180;
      var hasMatch = false;

      geoData.features.forEach(function(feature) {
        var name = feature.properties.name;
        var items = matchGeoToClassification(name, byCountry);
        if (!items) return;
        var geom = feature.geometry;
        if (!geom) return;

        hasMatch = true;
        var polys = geom.type === 'MultiPolygon' ? geom.coordinates : [geom.coordinates];
        polys.forEach(function(poly) {
          poly.forEach(function(ring) {
            ring.forEach(function(coord) {
              if (coord[1] < minLat) minLat = coord[1];
              if (coord[1] > maxLat) maxLat = coord[1];
              if (coord[0] < minLng) minLng = coord[0];
              if (coord[0] > maxLng) maxLng = coord[0];
            });
          });
        });
      });

      if (!hasMatch) return null;

      // If the bounds span most of the world, don't zoom (would look odd)
      var lngSpan = maxLng - minLng;
      var latSpan = maxLat - minLat;
      if (lngSpan > 300 || latSpan > 130) return null;

      return [[minLat, minLng], [maxLat, maxLng]];
    }

    // ── Master apply ──
    function applyFilters() {
      generateTitle();
      renderMapLayer();
      renderLegend();

      if (!map) return;

      // Priority: explicit region dropdown > auto-fit to matched countries
      var regionBounds = REGION_BOUNDS[regionFilter];
      if (regionBounds) {
        map.fitBounds(regionBounds, { padding: [20, 20], animate: true });
      } else {
        // Auto-zoom to the extent of shaded countries
        var filtered = getFilteredClassifications();
        var byCountry = getCountryMap(filtered);
        var dataBounds = getMatchedBounds(byCountry);

        if (dataBounds) {
          map.fitBounds(dataBounds, { padding: [40, 40], maxZoom: 6, animate: true });
        } else {
          map.setView([15, 20], 2, { animate: true });
        }
      }
    }

    // ── PNG Export ──
    // Renders GeoJSON polygons directly onto a high-res canvas using Web Mercator
    // projection. No DOM capture, no external libraries — pixel-perfect at any
    // resolution. Matches Leaflet's on-screen view bounds.

    function latToMercY(lat) {
      var rad = lat * Math.PI / 180;
      return Math.log(Math.tan(Math.PI / 4 + rad / 2));
    }

    function projectLng(lng, mapX, mapW, lngMin, lngMax) {
      return mapX + (lng - lngMin) / (lngMax - lngMin) * mapW;
    }

    function projectLat(lat, mapY, mapH, latMin, latMax) {
      var yMin = latToMercY(latMin);
      var yMax = latToMercY(latMax);
      var y = latToMercY(lat);
      return mapY + mapH - (y - yMin) / (yMax - yMin) * mapH;
    }

    document.getElementById('export-btn').addEventListener('click', function() {
      var btn = this;
      btn.disabled = true;
      btn.textContent = 'Exporting...';

      // Use requestAnimationFrame so the button text updates before heavy work
      requestAnimationFrame(function() { setTimeout(doExport, 50); });

      function doExport() {
      try {

      var branded = document.getElementById('branding-toggle').checked;
      var title = document.getElementById('map-title').textContent;
      var filtered = getFilteredClassifications();
      var byCountry = getCountryMap(filtered);
      var today = new Date().toISOString().split('T')[0];

      // Canvas dimensions (2x for retina/print quality)
      var W = 3200;
      var padding = 80;
      var headerH = branded ? 180 : 0;
      var legendH = 100;
      var footerH = branded ? 80 : 0;

      // Use Leaflet's current view bounds for projection
      var bounds = map.getBounds();
      var lngMin = bounds.getWest();
      var lngMax = bounds.getEast();
      var latMin = Math.max(bounds.getSouth(), -85);
      var latMax = Math.min(bounds.getNorth(), 85);

      // Match the on-screen map's aspect ratio exactly
      var mapEl = document.getElementById('maps-container');
      var mapH = Math.round(W * (mapEl.offsetHeight / mapEl.offsetWidth));

      var totalH = headerH + mapH + legendH + footerH;

      var mapX = 0;
      var mapY = headerH;
      var mapW = W;

      var canvas = document.createElement('canvas');
      canvas.width = W;
      canvas.height = totalH;
      var ctx = canvas.getContext('2d');

      // White page background
      ctx.fillStyle = '#ffffff';
      ctx.fillRect(0, 0, W, totalH);

      // Map area background (light gray like Leaflet)
      ctx.fillStyle = '#f0f0f0';
      ctx.fillRect(mapX, mapY, mapW, mapH);

      // Clip map rendering to map area
      ctx.save();
      ctx.beginPath();
      ctx.rect(mapX, mapY, mapW, mapH);
      ctx.clip();

      // ── Pass 1: Unmatched countries (subtle background) ──
      if (geoData && geoData.features) {
        geoData.features.forEach(function(feature) {
          var name = feature.properties.name;
          var items = matchGeoToClassification(name, byCountry);
          if (items) return;
          drawFeature(ctx, feature, '#e8e8e8', 1, '#d0d0d0', 1, 0.8);
        });
      }

      // ── Pass 2: Matched countries (colored fills, drawn on top) ──
      if (geoData && geoData.features) {
        geoData.features.forEach(function(feature) {
          var name = feature.properties.name;
          var items = matchGeoToClassification(name, byCountry);
          if (!items) return;

          var fillColor;
          if (displayMode === 'severity') {
            var totalSev = 0, sevCount = 0;
            items.forEach(function(c) {
              if (c.severity !== null && c.severity !== undefined) { totalSev += Number(c.severity); sevCount++; }
            });
            fillColor = getSeverityColor(sevCount > 0 ? totalSev / sevCount : 0);

    // (JSON Schema enforcement) for guaranteed valid JSON. Exclusion logic (e.g.
    // "outside of Africa") is handled deterministically in JS, not by the LLM.
    var AI_SUPABASE_URL = 'https://qykjjfbdvwqxqmsgiebs.supabase.co/functions/v1';

    // Collect all known country names from classification data for exclusion logic
    function getAllClassifiedCountries() {
      var latest = getLatestPerClassification(classifications);
      var countries = {};
      latest.forEach(function(c) {
        if (c.country) countries[IRC.normalizeCountry(c.country)] = true;
      });
      return Object.keys(countries);
    }

    document.getElementById('ai-builder-go').addEventListener('click', function() {
      var input = document.getElementById('ai-builder-input');
      var status = document.getElementById('ai-builder-status');
      var btn = this;
      var text = input.value.trim();
      if (!text) return;

      btn.disabled = true;
      btn.textContent = 'Thinking...';
      status.textContent = 'Interpreting your request...';
      status.className = 'ai-builder-status';

      // System prompt — the JSON schema is enforced server-side via response_format.
      // This prompt focuses on SEMANTIC guidance: when to use include vs exclude.
      var systemPrompt = 'You are a map configuration assistant for the IRC Emergency Classification system.\n' +
        'The user will describe a map they want. Return a JSON object with these fields:\n\n' +
        'REQUIRED fields:\n' +
        '- timePeriod: "all" | "fy" | "12m"\n' +
        '- selectedTypes: array from ["conflict","outbreak","food","hazard","complex"] (empty = all)\n' +
        '- selectedStances: array from ["red","orange","yellow","white"] (empty = all)\n' +
        '- regionFilter: "all" | "asia" | "east africa" | "latam" | "mena" | "rai" | "west and central africa"\n' +
        '- displayMode: "stance" | "severity"\n' +
        '- statusFilter: "active" | "all"\n' +
        '- title: descriptive title for this map\n\n' +
        'OPTIONAL geographic filter fields (use AT MOST ONE of these four):\n' +
        '- continent: INCLUDE only countries in this continent ("africa"|"asia"|"europe"|"americas"|"middleeast")\n' +
        '- excludeContinent: EXCLUDE countries in this continent — use for "outside of X", "not in X", "everywhere except X"\n' +
        '- countries: array of specific country names to INCLUDE\n' +
        '- excludeCountries: array of specific country names to EXCLUDE\n\n' +
        'CRITICAL RULES:\n' +
        '1. regionFilter only controls map ZOOM, not data filtering. To filter geographically, use continent/excludeContinent/countries/excludeCountries.\n' +
        '2. For NEGATION queries like "outside of Africa", "not in Asia", "everywhere except Europe" → use excludeContinent, NOT continent.\n' +
        '3. For INCLUSION queries like "in Africa", "African emergencies" → use continent.\n' +
        '4. Leave geographic fields as empty string "" or empty array [] when not needed.\n\n' +
        'Current fiscal year: ' + fyLabel + ' (Oct ' + (currentFY - 1) + ' – Sep ' + currentFY + ').\n\n' +
        'Examples:\n' +
        '"Red conflicts" → {"timePeriod":"all","selectedTypes":["conflict"],"selectedStances":["red"],"regionFilter":"all","displayMode":"stance","statusFilter":"active","continent":"","excludeContinent":"","countries":[],"excludeCountries":[],"title":"Active Red Conflict Classifications"}\n' +
        '"All classifications in Africa last 12 months" → {"timePeriod":"12m","selectedTypes":[],"selectedStances":[],"regionFilter":"all","displayMode":"stance","statusFilter":"active","continent":"africa","excludeContinent":"","countries":[],"excludeCountries":[],"title":"African Classifications — Last 12 Months"}\n' +
        '"Everything outside of Africa" → {"timePeriod":"all","selectedTypes":[],"selectedStances":[],"regionFilter":"all","displayMode":"stance","statusFilter":"active","continent":"","excludeContinent":"africa","countries":[],"excludeCountries":[],"title":"Non-African Classifications"}\n' +
        '"Severity heatmap excluding Middle East" → {"timePeriod":"all","selectedTypes":[],"selectedStances":[],"regionFilter":"all","displayMode":"severity","statusFilter":"active","continent":"","excludeContinent":"middleeast","countries":[],"excludeCountries":[],"title":"Global Severity Heatmap (excl. Middle East)"}';

      fetch(AI_SUPABASE_URL + '/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          messages: [
            { role: 'system', content: systemPrompt },
            { role: 'user', content: text }
          ],
          site: 'classification',
          mapBuilder: true
        })
      }).then(function(res) {
        if (!res.ok) throw new Error('Service error (' + res.status + ')');
        return res.json();
      }).then(function(data) {
        // Edge Function returns { config: "json string" }
        var configStr = data.config || '{}';
        var config = typeof configStr === 'string' ? JSON.parse(configStr) : configStr;
        applyAIConfig(config);
        status.textContent = 'Map updated!';
        status.className = 'ai-builder-status';
        btn.disabled = false;
        btn.textContent = 'Build Map';
      }).catch(function(err) {
        console.error('AI builder error:', err);
        status.textContent = 'Could not interpret that. Try rephrasing.';
        status.className = 'ai-builder-status error';
        btn.disabled = false;
        btn.textContent = 'Build Map';
      });
    });

    // Enter to submit AI builder
    document.getElementById('ai-builder-input').addEventListener('keydown', function(e) {
      if (e.key === 'Enter') {
        e.preventDefault();
        document.getElementById('ai-builder-go').click();
      }
    });

    function applyAIConfig(config) {
      // Time period
      if (config.timePeriod) {
        timePeriod = config.timePeriod;
        document.querySelectorAll('#time-pills .filter-pill').forEach(function(p) {
          p.classList.toggle('active', p.getAttribute('data-period') === timePeriod);
        });
      }

      // Types
      if (Array.isArray(config.selectedTypes)) {
        selectedTypes = config.selectedTypes;
        document.querySelectorAll('#type-toggles .toggle-btn').forEach(function(b) {
          b.classList.toggle('active', selectedTypes.indexOf(b.getAttribute('data-type')) !== -1);
        });
      }

      // Stances
      if (Array.isArray(config.selectedStances)) {
        selectedStances = config.selectedStances;
        document.querySelectorAll('#stance-toggles .toggle-btn').forEach(function(b) {
          b.classList.toggle('active', selectedStances.indexOf(b.getAttribute('data-stance')) !== -1);
        });
      }

      // Region (zoom only)
      if (config.regionFilter) {
        regionFilter = config.regionFilter;
        document.getElementById('region-select').value = regionFilter;
      }

      // Display mode
      if (config.displayMode) {
        displayMode = config.displayMode;
        document.querySelectorAll('input[name="display-mode"]').forEach(function(r) {
          r.checked = r.value === displayMode;
        });
      }

      // Status
      if (config.statusFilter) {
        statusFilter = config.statusFilter;
        document.querySelectorAll('#status-pills .filter-pill').forEach(function(p) {
          p.classList.toggle('active', p.getAttribute('data-status') === statusFilter);
        });
      }

      // ── Geographic filtering (deterministic — LLM just flags intent) ──
      var chipLabel = '';
      var continentLabels = { africa: 'Africa', asia: 'Asia', europe: 'Europe', americas: 'Americas', middleeast: 'Middle East' };

      if (config.excludeContinent && CONTINENT_COUNTRIES[config.excludeContinent]) {
        // EXCLUSION: get all classified countries, remove those in the excluded continent
        var excludeSet = {};
        CONTINENT_COUNTRIES[config.excludeContinent].forEach(function(c) { excludeSet[c.toLowerCase()] = true; });
        var allCountries = getAllClassifiedCountries();
        countryFilter = allCountries.filter(function(c) { return !excludeSet[c.toLowerCase()]; });
        chipLabel = 'Excluding ' + (continentLabels[config.excludeContinent] || config.excludeContinent);
      } else if (config.excludeCountries && config.excludeCountries.length > 0) {
        // EXCLUSION by specific countries
        var excludeSet2 = {};
        config.excludeCountries.forEach(function(c) { excludeSet2[c.toLowerCase()] = true; });
        var allCountries2 = getAllClassifiedCountries();
        countryFilter = allCountries2.filter(function(c) { return !excludeSet2[c.toLowerCase()]; });
        chipLabel = 'Excluding ' + (config.excludeCountries.length <= 3 ? config.excludeCountries.join(', ') : config.excludeCountries.length + ' countries');
      } else if (config.continent && CONTINENT_COUNTRIES[config.continent]) {
        // INCLUSION by continent
        countryFilter = CONTINENT_COUNTRIES[config.continent].slice();
        chipLabel = continentLabels[config.continent] || config.continent;
      } else if (config.countries && config.countries.length > 0) {
        // INCLUSION by specific countries
        countryFilter = config.countries.slice();
        chipLabel = config.countries.length <= 3 ? config.countries.join(', ') : config.countries.length + ' countries';
      } else {
        countryFilter = [];
      }

      // Show/hide the filter chip
      updateCountryFilterChip(chipLabel);

      // Title
      if (config.title) {
        document.getElementById('map-title').textContent = config.title;
        titleEdited = true;
      }

      applyFilters();
    }

    function updateCountryFilterChip(label) {
      var wrap = document.getElementById('ai-filter-chip-wrap');
      if (!label) {
        wrap.innerHTML = '';
        return;
      }
      wrap.innerHTML = '<span class="ai-filter-chip">&#127758; ' + label +
        ' <span class="ai-filter-chip-x" id="clear-country-filter">&times;</span></span>';
      document.getElementById('clear-country-filter').addEventListener('click', function() {
        countryFilter = [];
        wrap.innerHTML = '';
        applyFilters();
      });
    }

    // ── Init ──
    initMap();
  </script>
</body>
</html>

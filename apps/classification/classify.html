      <div class="calc-section">
        <h2 class="section-label">Country</h2>
        <select id="country-select" class="country-select"></select>
        <div id="country-meta" class="country-meta">
          Pre-Vulnerability: <span id="pv-display">—</span> | Robustness: <span id="rob-display">—</span>
        </div>
      </div>

      <div class="calc-section">
        <h2 class="section-label">Emergency Details</h2>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px;">
          <div>
            <label class="field-label" style="display: block; margin-bottom: 8px;">Emergency Title</label>
            <input id="emergency-name" type="text" class="text-input" placeholder="e.g., Acute: Drought in Kenya 2024">
          </div>
          <div>
            <label class="field-label" style="display: block; margin-bottom: 8px;">Classification ID</label>
            <input id="classification-code" type="text" class="text-input" placeholder="e.g., KE045">
          </div>
        </div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px;">
          <div>
            <label class="field-label" style="display: block; margin-bottom: 8px;">IRC Region</label>
            <select id="region-select" class="country-select">
              <option value="">Select region...</option>
              <option value="Asia">Asia</option>
              <option value="East Africa">East Africa</option>
              <option value="LatAm">LatAm</option>
              <option value="MENA">MENA</option>
              <option value="RAI">RAI</option>
              <option value="West and Central Africa">West and Central Africa</option>
            </select>
          </div>
          <div>
            <label class="field-label" style="display: block; margin-bottom: 8px;">Processing Speed</label>
            <select id="processing-speed" class="country-select">
              <option value="standard">Standard (5 working days)</option>
              <option value="rapid">Rapid (2 working days)</option>
              <option value="immediate">Immediate (12 hours)</option>
            </select>
          </div>
        </div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px;">
          <div>
            <label class="field-label" style="display: block; margin-bottom: 8px;">Date Notification Sent</label>
            <input id="classification-date" type="date" class="date-input">
          </div>
          <div>
            <label class="field-label" style="display: block; margin-bottom: 8px;">Expiration Date <span style="color:#888;font-size:0.85em">(auto: 6 weeks)</span></label>
            <input id="expiration-date" type="date" class="date-input">
          </div>
        </div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px;">
          <div>
            <label class="field-label" style="display: block; margin-bottom: 8px;">Reclassification #</label>
            <input id="reclass-number" type="number" class="number-input" min="1" max="20" value="1" placeholder="1 = initial">
          </div>
          <div>
            <label class="field-label" style="display: block; margin-bottom: 8px;">Previous Severity</label>
            <input id="previous-severity" type="number" class="number-input" min="0" max="10" placeholder="For reclass validation">
          </div>
        </div>
        <div id="reclass-warning" style="display:none;background:#fff3e0;border:1px solid #F58220;border-radius:8px;padding:12px;margin-bottom:16px;font-size:0.9em;color:#e65100;"></div>
        <div id="mission-alignment-note" style="display:none;background:#e3f2fd;border:1px solid #2196F3;border-radius:8px;padding:12px;margin-bottom:16px;font-size:0.9em;color:#1565c0;"></div>
      </div>

      <div class="section-divider"></div>

      <div class="calc-section">
        <h2 class="section-label" id="metrics-label">Conflict Metrics</h2>
        <div id="metrics-container"></div>
      </div>

      <div id="result-section" class="result-section" style="display: none;">
        <h2 class="section-label">Classification Result</h2>
        <div class="result-row">
          <div class="result-item">
            <span class="result-label">Overall Severity</span>
            <div id="severity-display" class="severity-badge">—</div>
          </div>
          <div class="result-item">
            <span class="result-label">Stance</span>
            <div id="stance-display" class="stance-badge white">—</div>
          </div>
        </div>
        <div class="matrix-path" id="matrix-path"></div>
      </div>

      <div class="calc-section">
        <h2 class="section-label">Subnational Locations</h2>
        <div id="subnational-section" class="subnational-section" style="display: none;">
          <div id="subnational-list" class="subnational-list"></div>
          <button id="add-subnational" class="btn btn-secondary" style="width: 100%;">+ Add Subnational Location</button>
        </div>
      </div>

      <div class="calc-section">
        <h2 class="section-label">Additional Information</h2>
        <div style="margin-bottom: 16px;">
          <label class="section-label" style="display: block; margin-bottom: 8px;">Notes</label>
          <textarea id="classification-notes" placeholder="Add any relevant notes or context..."></textarea>
        </div>
        <div>
          <label class="section-label" style="display: block; margin-bottom: 8px;">Confidence Level</label>
          <div class="confidence-buttons">
            <button class="confidence-btn" data-confidence="low">Low</button>
            <button class="confidence-btn selected" data-confidence="medium">Medium</button>
            <button class="confidence-btn" data-confidence="high">High</button>
          </div>
        </div>
      </div>

      <div class="btn-group" style="margin-top: 32px;">
        <button id="save-btn" class="btn btn-primary" style="flex: 1;">Save Classification</button>
        <button id="clear-btn" class="btn btn-secondary">Clear Form</button>
      </div>
    </div>

    <!-- ── VIEW SECTION (View mode) ── -->
    <div id="view-section" class="tab-content" style="display: none;">
      <div id="view-content"></div>
    </div>
  </main>

  <div id="footer-mount"></div>

      </div>
    </div>
  </div>

        DOM.classifySection = document.getElementById('classify-section');
        DOM.viewSection = document.getElementById('view-section');
        DOM.viewContent = document.getElementById('view-content');
        DOM.headerMount = document.getElementById('header-mount');
        DOM.navMount = document.getElementById('nav-mount');
        DOM.footerMount = document.getElementById('footer-mount');
      }

      function renderHeader() {
        DOM.headerMount.innerHTML = IRC.renderHeader('classify');
      }

      function renderNav() {
        DOM.navMount.innerHTML = IRC.renderNav('classify');
      }

      function renderFooter() {
        DOM.footerMount.innerHTML = IRC.renderFooter();
      }

      function populateCountries() {
        var countries = IRC.COUNTRIES.slice().sort(function(a, b) { return a[0].localeCompare(b[0]); });
        countries.forEach(function(c) {
          var opt = document.createElement('option');
          opt.value = c[0];
          opt.textContent = c[0];
          DOM.countrySelect.appendChild(opt);
        });
      }

      function getSeverityForMetric(metricId, value) {
        if (!value && value !== 0) return 0;
        var thresholds = IRC.THRESHOLDS[state.type][metricId];
        for (var i = thresholds.length - 1; i >= 0; i--) {
          if (value >= thresholds[i][0]) return thresholds[i][1];
        }
        return 0;
      }

      function calculateOverallSeverity() {
        var max = 0;
        for (var key in state.metrics) {
          max = Math.max(max, state.metrics[key].severity || 0);
        }
        return max;
      }

      function updateCalculations() {
        state.severity = calculateOverallSeverity();
        if (state.country) {
          state.stance = IRC.lookupStance(state.severity, state.country.pv, state.country.rob);
        }
        renderResult();
      }

      function renderMetrics() {
        DOM.metricsContainer.innerHTML = '';
        state.metrics = {};
        var config = IRC.METRIC_CONFIGS[state.type];
        var typeNames = {conflict: 'Conflict', outbreak: 'Outbreak', food: 'Food Insecurity', hazard: 'Natural Hazards'};
        DOM.metricsLabel.textContent = (typeNames[state.type] || state.type) + ' Metrics';

        config.forEach(function(metric) {
          state.metrics[metric.id] = {value: '', severity: 0};
          var row = document.createElement('div');
          row.className = 'metric-row';
          row.innerHTML = '<div class="metric-left"><label class="metric-label">' + metric.label + '</label><span class="metric-hint">' + metric.hint + '</span></div><input type="number" class="number-input metric-input" data-metric="' + metric.id + '" placeholder="0" step="0.01"><div class="severity-badge">—</div>';
          DOM.metricsContainer.appendChild(row);
        });

        var inputs = DOM.metricsContainer.querySelectorAll('.metric-input');
        inputs.forEach(function(input) {
          input.addEventListener('input', IRC.debounce(function(e) {
            var metricId = e.target.dataset.metric;
            var value = parseFloat(e.target.value) || 0;
            state.metrics[metricId].value = value;
            state.metrics[metricId].severity = getSeverityForMetric(metricId, value);
            var badge = e.target.parentElement.querySelector('.severity-badge');
            var sev = state.metrics[metricId].severity;
            badge.textContent = sev || '—';
            badge.className = 'severity-badge sev-' + sev;
            updateCalculations();
          }, 200));
        });
      }

      function renderResult() {
        if (state.severity === 0) {
          DOM.resultSection.style.display = 'none';
          DOM.missionNote.style.display = 'none';
          return;
        }
        DOM.resultSection.style.display = 'block';
        DOM.severityDisplay.textContent = state.severity;
        DOM.severityDisplay.className = 'severity-badge sev-' + state.severity;
        DOM.stanceDisplay.textContent = state.stance.toUpperCase();
        DOM.stanceDisplay.className = 'stance-badge ' + state.stance;
        var stanceShort = IRC.STANCE_SHORT[state.stance] || 'Unknown';
        var stanceDesc = IRC.STANCE_DESCRIPTIONS[state.stance] || '';
        DOM.matrixPath.innerHTML = 'Severity ' + state.severity + ' × PV ' + (state.country ? state.country.pv : '—') + ' × Rob ' + (state.country ? state.country.rob : '—') + ' → <strong>' + stanceShort + '</strong>';

        // Show mission alignment note for White stance
        if (state.stance === 'white') {
          DOM.missionNote.style.display = 'block';
          DOM.missionNote.innerHTML = '<strong>White Stance — Outside Mission Scope:</strong> This classification indicates the emergency does not align with IRC\'s Who We Serve / Where We Work criteria. Only Yellow, Orange, and Red stances signal mission-aligned emergencies requiring IRC response.';
        } else {
          DOM.missionNote.style.display = 'none';
        }

        // Check reclassification rules
        checkReclassification();
      }

      function checkReclassification() {
        var reclassNum = parseInt(DOM.reclassNumber.value) || 1;
        var prevSev = parseInt(DOM.previousSeverity.value);
        if (reclassNum >= 2 && !isNaN(prevSev) && state.severity > 0) {
          var result = IRC.canReclassify(reclassNum, state.severity, prevSev);
          if (!result.allowed) {
            DOM.reclassWarning.style.display = 'block';
            DOM.reclassWarning.innerHTML = '<strong>Reclassification Warning:</strong> ' + result.reason + '. After the first routine reclassification, severity must increase unless currently Red 10.';
          } else {
            DOM.reclassWarning.style.display = 'block';
            DOM.reclassWarning.style.background = '#e8f5e9';
            DOM.reclassWarning.style.borderColor = '#4CAF50';
            DOM.reclassWarning.style.color = '#2e7d32';
            DOM.reclassWarning.innerHTML = '<strong>Reclassification OK:</strong> ' + result.reason;
          }
        } else {
          DOM.reclassWarning.style.display = 'none';
        }
      }

      function updateCountryMeta() {
        if (state.country) {
          DOM.pvDisplay.textContent = state.country.pv;
          DOM.robDisplay.textContent = state.country.rob;
        } else {
          DOM.pvDisplay.textContent = '—';
          DOM.robDisplay.textContent = '—';
        }
      }

      function clearForm() {
        state.editingId = null;
        state.type = 'conflict';
        state.country = null;
        state.metrics = {};
        state.subnational = [];
        state.confidence = 'medium';
        DOM.emergencyName.value = '';
        DOM.classificationCode.value = '';
        DOM.classificationDate.value = new Date().toISOString().split('T')[0];
        DOM.expirationDate.value = IRC.calculateExpirationDate(DOM.classificationDate.value);
        DOM.regionSelect.value = '';
        DOM.processingSpeed.value = 'standard';
        DOM.reclassNumber.value = '1';
        DOM.previousSeverity.value = '';
        DOM.reclassWarning.style.display = 'none';
        DOM.missionNote.style.display = 'none';
        DOM.classificationNotes.value = '';
        DOM.errorContainer.innerHTML = '';
        DOM.typeButtons.forEach(function(btn) { btn.classList.toggle('selected', btn.dataset.type === 'conflict'); });
        DOM.countrySelect.value = '';
        DOM.pvDisplay.textContent = '—';
        DOM.robDisplay.textContent = '—';
        renderMetrics();
        DOM.resultSection.style.display = 'none';
        DOM.subnationalList.innerHTML = '';
        DOM.subnationalSection.style.display = 'none';
        DOM.confidenceButtons.forEach(function(btn) { btn.classList.toggle('selected', btn.dataset.confidence === 'medium'); });
      }

      function showError(msg) {
        DOM.errorContainer.innerHTML = '<div class="error-message">' + msg + '</div>';
      }

      function saveClassification() {
        if (!state.country || !DOM.emergencyName.value.trim()) {
          showError('Please fill in at least Country and Emergency Details');
          return;
        }
        if (state.severity === 0) {
          showError('Please enter at least one metric value');
          return;
        }
        var classifications = IRC.getClassifications();
        var c = {
          id: state.editingId || IRC.uuid(),
          classificationId: DOM.classificationCode.value.trim(),
          type: state.type,
          country: state.country.name,
          region: DOM.regionSelect.value,
          emergencyName: DOM.emergencyName.value.trim(),
          date: DOM.classificationDate.value,
          expirationDate: DOM.expirationDate.value,
          processingSpeed: DOM.processingSpeed.value,
          reclassificationNumber: parseInt(DOM.reclassNumber.value) || 1,
          previousSeverity: parseInt(DOM.previousSeverity.value) || null,
          metrics: state.metrics,
          severity: state.severity,
          stance: state.stance,
          notes: DOM.classificationNotes.value.trim(),
          confidence: state.confidence,
          subnational: state.subnational,
          createdAt: state.editingId ? (classifications.find(function(x) { return x.id === state.editingId; }) || {}).createdAt : new Date().toISOString()
        };
        var idx = classifications.findIndex(function(x) { return x.id === c.id; });
        if (idx >= 0) {
          classifications[idx] = c;
        } else {
          classifications.push(c);
        }
        IRC.saveClassifications(classifications);
        // Save to Supabase, then redirect
        IRC.db.save(c).then(function() {
          window.location.href = 'index.html';
        }).catch(function() {
          window.location.href = 'index.html';
        });
      }

      function deleteClassification(id) {
        var classifications = IRC.getClassifications();
        classifications = classifications.filter(function(c) { return c.id !== id; });
        IRC.saveClassifications(classifications);
        // Delete from Supabase, then redirect
        IRC.db.remove(id).then(function() {
          window.location.href = 'index.html';
        }).catch(function() {
          window.location.href = 'index.html';
        });
      }

      function viewClassification(id) {
        var classifications = IRC.getClassifications();
        var c = classifications.find(function(x) { return x.id === id; });
        if (!c) return;
        var html = '<div class="calc-section"><button class="btn btn-secondary" style="margin-bottom:16px" onclick="window.location.href=\'index.html\'">← Back</button></div>';
        html += '<div class="calc-section"><h2 class="section-label">Classification Details</h2>';
        html += '<div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px">';
        html += '<div><label class="field-label">Emergency Title</label><div style="padding:12px;background:var(--light-gray);border-radius:8px">' + (c.emergencyName || '—') + '</div></div>';
        html += '<div><label class="section-label">Country</label><div style="padding:12px;background:var(--light-gray);border-radius:8px">' + (c.country || '—') + '</div></div>';
        html += '<div><label class="section-label">Classification ID</label><div style="padding:12px;background:var(--light-gray);border-radius:8px">' + (c.classificationId || c.code || '—') + '</div></div>';
        var regionDisplay = c.region || '—';
        var groupedRegion = IRC.getGroupedRegion(c.region);
        if (groupedRegion && groupedRegion !== c.region) {
          regionDisplay += ' <span style="color:#888;font-size:0.85em">(now ' + groupedRegion + ')</span>';
        }
        html += '<div><label class="section-label">IRC Region</label><div style="padding:12px;background:var(--light-gray);border-radius:8px">' + regionDisplay + '</div></div>';
        html += '<div><label class="section-label">Date Notification Sent</label><div style="padding:12px;background:var(--light-gray);border-radius:8px">' + (c.date ? IRC.formatDate(c.date) : '—') + '</div></div>';
        var expDisplay = c.expirationDate ? IRC.formatDate(c.expirationDate) : '—';
        var daysLeft = IRC.daysUntilExpiration(c.expirationDate);
        if (daysLeft !== null) {
          if (daysLeft < 0) {
            expDisplay += ' <span style="color:#E52911;font-size:0.85em;font-weight:600">(EXPIRED)</span>';
          } else if (daysLeft <= 7) {
            expDisplay += ' <span style="color:#F58220;font-size:0.85em">(' + daysLeft + ' days left)</span>';
          } else {
            expDisplay += ' <span style="color:#888;font-size:0.85em">(' + daysLeft + ' days left)</span>';
          }
        }
        html += '<div><label class="section-label">Expiration Date</label><div style="padding:12px;background:var(--light-gray);border-radius:8px">' + expDisplay + '</div></div>';
        var speedLabel = (IRC.PROCESSING_SPEEDS[c.processingSpeed] || {}).label || c.processingSpeed || '—';
        html += '<div><label class="section-label">Processing Speed</label><div style="padding:12px;background:var(--light-gray);border-radius:8px">' + speedLabel + '</div></div>';
        var reclassNum = c.reclassificationNumber || 1;
        html += '<div><label class="section-label">Reclassification #</label><div style="padding:12px;background:var(--light-gray);border-radius:8px">' + (reclassNum <= 1 ? 'Initial classification' : 'Reclassification #' + reclassNum) + '</div></div>';
        html += '</div></div>';
        html += '<div class="calc-section"><h2 class="section-label">Metrics</h2>';
        for (var key in c.metrics) {
          html += '<div style="padding:8px;background:var(--light-gray);border-radius:6px;margin-bottom:8px">' + key + ': ' + IRC.formatNum(c.metrics[key].value) + ' (Severity ' + c.metrics[key].severity + ')</div>';
        }
        html += '</div>';
        html += '<div class="result-section"><h2 class="section-label">Result</h2>';
        html += '<div class="result-row"><div class="result-item"><span class="result-label">Severity</span><div class="severity-badge sev-' + c.severity + '">' + c.severity + '</div></div><div class="result-item"><span class="result-label">Stance</span><div class="stance-badge ' + c.stance + '">' + c.stance.toUpperCase() + '</div></div></div>';
        var stanceDesc = IRC.STANCE_DESCRIPTIONS[c.stance] || '';
        if (stanceDesc) {
          var descColor = c.stance === 'white' ? '#1565c0' : '#555';
          var descBg = c.stance === 'white' ? '#e3f2fd' : '#f5f5f5';
          html += '<div style="margin-top:12px;padding:12px;background:' + descBg + ';border-radius:8px;font-size:0.9em;color:' + descColor + '">' + stanceDesc + '</div>';
        }
        html += '</div>';
        if (c.notes) {
          html += '<div class="calc-section"><h2 class="section-label">Notes</h2><div style="padding:12px;background:var(--light-gray);border-radius:8px">' + c.notes + '</div></div>';
        }
        html += '<div class="calc-section"><h2 class="section-label">Confidence</h2><div style="padding:12px;background:var(--light-gray);border-radius:8px;text-transform:capitalize">' + c.confidence + '</div></div>';
        html += '<div class="btn-group" style="margin-top:32px"><button class="btn btn-primary" style="flex:1" onclick="window.classifyApp.editClassification(\'' + id + '\')">Edit</button><button class="btn btn-danger" style="flex:1" onclick="window.classifyApp.confirmDeleteClassification(\'' + id + '\')">Delete</button></div>';
        DOM.viewContent.innerHTML = html;
        switchToView();
      }

      function editClassification(id) {
        var classifications = IRC.getClassifications();
        var c = classifications.find(function(x) { return x.id === id; });
        if (!c) return;
        state.type = c.type;
        state.editingId = id;
        state.metrics = c.metrics;
        state.subnational = c.subnational || [];
        state.confidence = c.confidence || 'medium';
        renderMetrics();
        DOM.typeButtons.forEach(function(btn) {
          btn.classList.toggle('selected', btn.dataset.type === c.type);
        });
        DOM.countrySelect.value = c.country;
        var countryData = IRC.COUNTRIES.find(function(x) { return x[0] === c.country; });
        state.country = countryData ? {name: countryData[0], pop: countryData[1], pv: countryData[2], rob: countryData[3]} : null;
        updateCountryMeta();
        DOM.emergencyName.value = c.emergencyName || '';
        DOM.classificationCode.value = c.classificationId || c.code || '';
        DOM.classificationDate.value = c.date || '';
        DOM.expirationDate.value = c.expirationDate || '';
        DOM.processingSpeed.value = c.processingSpeed || 'standard';
        DOM.reclassNumber.value = c.reclassificationNumber || 1;
        DOM.previousSeverity.value = c.previousSeverity || '';
        // If editing a record with a legacy region not in the dropdown, add it temporarily
        var regionVal = c.region || '';
        if (regionVal && !DOM.regionSelect.querySelector('option[value="' + regionVal + '"]')) {
          var legacyOpt = document.createElement('option');
          legacyOpt.value = regionVal;
          var grouped = IRC.getGroupedRegion(regionVal);
          legacyOpt.textContent = regionVal + (grouped !== regionVal ? ' (now ' + grouped + ')' : '');
          DOM.regionSelect.appendChild(legacyOpt);
        }
        DOM.regionSelect.value = regionVal;
        DOM.classificationNotes.value = c.notes || '';
        DOM.confidenceButtons.forEach(function(btn) {
          btn.classList.toggle('selected', btn.dataset.confidence === c.confidence);
        });
        DOM.metricsContainer.querySelectorAll('.metric-input').forEach(function(input) {
          var metricId = input.dataset.metric;
          if (c.metrics[metricId]) {
            input.value = c.metrics[metricId].value;
          }
        });
        updateCalculations();
        switchToForm();
      }

      function confirmDeleteClassification(id) {
        state.deleteId = id;
        DOM.deleteDialog.classList.add('active');
      }

      function switchToForm() {
        DOM.classifySection.classList.add('active');
        DOM.viewSection.classList.remove('active');
        DOM.classifySection.style.display = 'block';
        DOM.viewSection.style.display = 'none';
      }

      function switchToView() {
        DOM.classifySection.classList.remove('active');
        DOM.viewSection.classList.add('active');
        DOM.classifySection.style.display = 'none';
        DOM.viewSection.style.display = 'block';
      }

      function handleURLParameters() {
        var params = new URLSearchParams(window.location.search);
        if (params.has('type')) {
          var typeParam = params.get('type');
          state.type = typeParam;
          DOM.typeButtons.forEach(function(btn) {
            btn.classList.toggle('selected', btn.dataset.type === typeParam);
          });
          renderMetrics();
        }
        if (params.has('view')) {
          var viewId = params.get('view');
          viewClassification(viewId);
        }
        if (params.has('edit')) {
          var editId = params.get('edit');
          editClassification(editId);
        }
      }

      function attachEventListeners() {
        DOM.typeButtons.forEach(function(btn) {
          btn.addEventListener('click', function() {
            state.type = btn.dataset.type;
            DOM.typeButtons.forEach(function(b) { b.classList.remove('selected'); });
            btn.classList.add('selected');
            renderMetrics();
          });
        });

        DOM.countrySelect.addEventListener('change', function() {
          var c = IRC.COUNTRIES.find(function(x) { return x[0] === DOM.countrySelect.value; });
          state.country = c ? {name: c[0], pop: c[1], pv: c[2], rob: c[3]} : null;
          updateCountryMeta();
          updateCalculations();
        });

        // Auto-calculate expiration when notification date changes
        DOM.classificationDate.addEventListener('change', function() {
          if (this.value && !state.editingId) {
            DOM.expirationDate.value = IRC.calculateExpirationDate(this.value);
          }
        });

        // Live reclassification validation
        DOM.reclassNumber.addEventListener('input', function() { updateCalculations(); });
        DOM.previousSeverity.addEventListener('input', function() { updateCalculations(); });

        DOM.confidenceButtons.forEach(function(btn) {
          btn.addEventListener('click', function() {
            state.confidence = btn.dataset.confidence;
            DOM.confidenceButtons.forEach(function(b) { b.classList.remove('selected'); });
            btn.classList.add('selected');
          });
        });

        DOM.saveBtn.addEventListener('click', saveClassification);
        DOM.clearBtn.addEventListener('click', clearForm);

        DOM.confirmDeleteBtn.addEventListener('click', function() {
          deleteClassification(state.deleteId);
          DOM.deleteDialog.classList.remove('active');
          state.deleteId = null;
        });

        DOM.cancelDeleteBtn.addEventListener('click', function() {
          DOM.deleteDialog.classList.remove('active');
          state.deleteId = null;
        });
      }

      function init() {
        initDOM();
        renderHeader();
        renderNav();
        renderFooter();
        populateCountries();
        DOM.classificationDate.value = new Date().toISOString().split('T')[0];
        DOM.expirationDate.value = IRC.calculateExpirationDate(DOM.classificationDate.value);
        renderMetrics();
        attachEventListeners();
        handleURLParameters();
        window.classifyApp = {
          editClassification: editClassification,
          confirmDeleteClassification: confirmDeleteClassification
        };
        // Load from Supabase in background (for edits, the URL param handler
        // already used cached data; this ensures cache is fresh for next action)
        IRC.db.migrateFromLocalStorage().then(function() { return IRC.db.load(); });
      }

      if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', init);
      } else {
        init();
      }
    })();
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard — IRC Emergency Classification</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="albert-panel.css">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
</head>
<body>
  <div id="header-mount"></div>
  <main>
    <div id="nav-mount"></div>

    <div class="dashboard-container">
      <!-- At a Glance -->
      <section class="at-a-glance">
        <h2 class="section-title">At a Glance</h2>
        <div class="at-a-glance-controls">
          <div class="time-filter-pills">
            <button class="time-pill active" data-period="all">All</button>
            <button class="time-pill" data-period="fy" id="fy-pill">FY26</button>
            <button class="time-pill" data-period="12m">Last 12 months</button>
          </div>
          <!-- Reclassification history shown via click-to-expand on cards -->
        </div>

        <section class="summary-cards" id="summary-cards-main">
          <div class="summary-card">
            <div class="summary-card-value" id="total-count">0</div>
            <div class="summary-card-label">Total Classifications</div>
          </div>
          <div class="summary-card">
            <div class="summary-card-value" id="red-count" style="color: var(--red-5);">0</div>
            <div class="summary-card-label">Red</div>
          </div>
          <div class="summary-card">
            <div class="summary-card-value" id="orange-count" style="color: var(--orange-4);">0</div>
            <div class="summary-card-label">Orange</div>
          </div>
          <div class="summary-card">
            <div class="summary-card-value" id="avg-severity">0</div>
            <div class="summary-card-label">Avg Severity</div>
          </div>
          <div class="summary-card">
            <div class="summary-card-value" id="countries-count">0</div>
            <div class="summary-card-label">Countries Affected</div>
          </div>
        </section>

        <h3 class="at-a-glance-subhead">By Emergency Type</h3>
        <section class="summary-cards" id="summary-cards-type">
          <div class="summary-card">
            <div class="summary-card-value" id="type-conflict">0</div>
            <div class="summary-card-label">Conflict</div>
          </div>
          <div class="summary-card">
            <div class="summary-card-value" id="type-outbreak">0</div>
            <div class="summary-card-label">Outbreak</div>
          </div>
          <div class="summary-card">
            <div class="summary-card-value" id="type-food">0</div>
            <div class="summary-card-label">Food Insecurity</div>
          </div>
          <div class="summary-card">
            <div class="summary-card-value" id="type-hazard">0</div>
            <div class="summary-card-label">Natural Hazard</div>
          </div>
          <div class="summary-card">
            <div class="summary-card-value" id="type-complex">0</div>
            <div class="summary-card-label">Complex</div>
          </div>
        </section>
      </section>

      <!-- Classification Map -->
      <section class="map-section">
        <div class="map-section-header">
          <h2 class="section-title">Classification Map</h2>
          <div class="map-controls">
            <button class="map-toggle-btn active" data-view="map" title="Map view">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="1 6 1 22 8 18 16 22 23 18 23 2 16 6 8 2 1 6"/><line x1="8" y1="2" x2="8" y2="18"/><line x1="16" y1="6" x2="16" y2="22"/></svg>
              Map
            </button>
            <button class="map-toggle-btn" data-view="list" title="List view">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
              List
            </button>
          </div>
        </div>
        <div id="classification-map" style="height: 420px; border-radius: 8px; background: #f0f0f0;"></div>
        <div class="map-legend" id="map-legend">
          <span class="map-legend-item"><span class="map-legend-dot" style="background:#E52911;"></span> Red</span>
          <span class="map-legend-item"><span class="map-legend-dot" style="background:#F58220;"></span> Orange</span>
          <span class="map-legend-item"><span class="map-legend-dot" style="background:#FFC72C;"></span> Yellow</span>
          <span class="map-legend-item"><span class="map-legend-dot" style="background:#E9E9E9;"></span> White / No data</span>
        </div>
      </section>

      <!-- Recent Classifications -->
      <section class="recent-section shaded-section">
        <h2 class="section-title">Recent Classifications</h2>

        <!-- Filter/Sort Toolbar -->
        <div class="recent-toolbar">
          <!-- Top row: Stance left, Sort right -->
          <div class="toolbar-row">
            <div class="toolbar-group">
              <div class="toolbar-label">Stance:</div>
              <div class="stance-pills">
                <button class="stance-pill active" data-stance="all">All</button>
                <button class="stance-pill stance-pill-red" data-stance="red">Red</button>
                <button class="stance-pill stance-pill-orange" data-stance="orange">Orange</button>
                <button class="stance-pill stance-pill-yellow" data-stance="yellow">Yellow</button>
                <button class="stance-pill stance-pill-white" data-stance="white">White</button>
              </div>
            </div>

            <div class="toolbar-group">
              <div class="toolbar-label">Status:</div>
              <div class="status-pills">
                <button class="status-pill active" data-status="active">Active</button>
                <button class="status-pill" data-status="all">All</button>
                <button class="status-pill" data-status="expired">Expired</button>
                <button class="status-pill" data-status="expiring">Expiring Soon</button>
              </div>
            </div>

            <div class="toolbar-group toolbar-sort">
              <label for="sort-select">Sort:</label>
              <select id="sort-select" class="toolbar-select">
                <option value="newest">Newest first</option>
                <option value="oldest">Oldest first</option>
                <option value="severity-high">Severity high→low</option>
                <option value="country">Country A→Z</option>
              </select>
            </div>
          </div>

          <!-- Bottom row: Type icons left, Country search right -->
          <div class="toolbar-row">
            <div class="toolbar-group">
              <div class="toolbar-label">Type:</div>
              <div class="type-filter-icons">
                <button class="type-filter-btn active" data-type="all" title="All Types">All</button>

  <style>
    .reclass-modal-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.5);
      z-index: 9999;
      display: flex; align-items: center; justify-content: center;
      animation: reclassOverlayIn 0.15s ease;
    }
    @keyframes reclassOverlayIn { from { opacity: 0; } to { opacity: 1; } }
    @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    .reclass-modal {
      background: #fff;
      border-radius: 12px;
      width: min(560px, 92vw);
      max-height: 80vh;
      display: flex; flex-direction: column;
      box-shadow: 0 12px 40px rgba(0,0,0,0.25);
      animation: reclassModalIn 0.2s ease;
      overflow: hidden;
    }
    @keyframes reclassModalIn { from { transform: translateY(24px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    .reclass-modal-header {
      background: var(--neutral-900, #1a1a2e);
      color: #fff;
      padding: 16px 20px;
      display: flex; align-items: center; justify-content: space-between;
      flex-shrink: 0;
    }
    .reclass-modal-title {
      margin: 0; font-size: 1.05rem; font-weight: 600;
    }
    .reclass-modal-close {
      background: none; border: none; color: #fff;
      font-size: 1.6rem; cursor: pointer; line-height: 1;
      padding: 0 4px; opacity: 0.8; transition: opacity 0.15s;
    }
    .reclass-modal-close:hover { opacity: 1; }
    .reclass-modal-body {
      padding: 20px 24px;
      overflow-y: auto;
      flex: 1;
    }
    /* Timeline layout */
    .reclass-timeline { list-style: none; margin: 0; padding: 0; position: relative; }
    .reclass-timeline::before {
      content: '';
      position: absolute; left: 14px; top: 8px; bottom: 8px;
      width: 3px;
      background: var(--neutral-200, #e2e2e2);
      border-radius: 2px;
    }
    .reclass-step {
      position: relative;
      padding: 0 0 20px 44px;
      display: flex; flex-direction: column; gap: 4px;
    }
    .reclass-step:last-child { padding-bottom: 0; }
    .reclass-step-dot {
      position: absolute; left: 6px; top: 4px;
      width: 19px; height: 19px;
      border-radius: 50%;
      border: 3px solid #fff;
      box-shadow: 0 0 0 2px var(--neutral-300, #ccc);
    }
    .reclass-step-header {
      display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
    }
    .reclass-step-date {
      font-size: 0.82rem; color: var(--neutral-500, #666);
    }
    .reclass-step-badge {
      display: inline-block;
      padding: 2px 10px;
      border-radius: 12px;
      font-size: 0.82rem;
      font-weight: 600;
      line-height: 1.4;
    }
    .reclass-step-label {
      font-size: 0.78rem;
      color: var(--neutral-400, #888);
      font-style: italic;
    }
    .reclass-step-desc {
      font-size: 0.88rem;
      color: var(--neutral-700, #333);
      margin-top: 2px;

    .reclass-step-link {

  <script>
    // Render shared chrome
    document.getElementById('header-mount').innerHTML = IRC.renderHeader('dashboard');
    document.getElementById('nav-mount').innerHTML = IRC.renderNav();
    document.getElementById('footer-mount').innerHTML = IRC.renderFooter();

    // 2B: Loading indicator
    var loadingOverlay = document.createElement('div');
    loadingOverlay.id = 'dashboard-loading';
    loadingOverlay.style.cssText = 'position:fixed;inset:0;background:rgba(255,255,255,0.8);z-index:50;display:flex;align-items:center;justify-content:center;';
    loadingOverlay.innerHTML = '<div style="text-align:center;"><div style="width:32px;height:32px;border:3px solid #E9E9E9;border-top-color:#FFC72C;border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto 12px;"></div><p style="font-size:0.875rem;color:#666;">Loading classifications...</p></div>';
    document.body.appendChild(loadingOverlay);

    // Load data from Supabase (with localStorage fallback)
    var classifications = IRC.getClassifications(); // immediate from cache
    // Async load from Supabase, then re-render with fresh data
    IRC.db.migrateFromLocalStorage().then(function() {
      return IRC.db.load();
    }).then(function(data) {
      classifications = data;
      updateSummaryCards();
      renderRecent();
      var loadEl = document.getElementById('dashboard-loading');
      if (loadEl) loadEl.remove();
    });

    // Determine current fiscal year (IRC FY runs Oct 1 – Sep 30)
    var now = new Date();
    var currentFY = now.getMonth() >= 9 ? now.getFullYear() + 1 : now.getFullYear();
    var fyLabel = 'FY' + String(currentFY).slice(-2);
    document.getElementById('fy-pill').textContent = fyLabel;

    // Fiscal year start/end
    var fyStart = new Date(currentFY - 1, 9, 1); // Oct 1 of prior year
    var fyEnd = new Date(currentFY, 8, 30, 23, 59, 59); // Sep 30

    // Time period filter state
    var timePeriod = 'all';

    // Status filter state: 'active' (default), 'expired', 'all'
    var statusFilter = 'active';

    // Deduplicate classifications by classification_id, keeping only the latest
    // reclassification (highest reclassificationNumber) per group
    function getLatestPerClassification(list) {
      var grouped = {};
      list.forEach(function(c) {
        var key = c.classificationId || c.id;
        var num = c.reclassificationNumber || 1;
        if (!grouped[key] || num > (grouped[key].reclassificationNumber || 1)) {
          grouped[key] = c;
        }
      });
      return Object.keys(grouped).map(function(k) { return grouped[k]; });
    }

    // Get all reclassifications for a given classification_id
    function getReclassGroup(classificationId) {
      return classifications.filter(function(c) {
        return (c.classificationId || c.id) === classificationId;
      }).sort(function(a, b) {
        return (a.reclassificationNumber || 1) - (b.reclassificationNumber || 1);
      });
    }

    // Count reclassifications per classification_id
    function getReclassCounts() {
      var counts = {};
      classifications.forEach(function(c) {
        var key = c.classificationId || c.id;
        counts[key] = (counts[key] || 0) + 1;
      });
      return counts;
    }

    function getFilteredByTime() {
      // Always show only latest reclassification per classification_id
      var base = getLatestPerClassification(classifications);
      if (timePeriod === 'all') return base;
      if (timePeriod === 'fy') {
        return base.filter(function(c) {
          var d = new Date(c.date);
          return d >= fyStart && d <= fyEnd;
        });
      } else if (timePeriod === '12m') {
        var cutoff = new Date();
        cutoff.setFullYear(cutoff.getFullYear() - 1);
        return base.filter(function(c) {
          return new Date(c.date) >= cutoff;
        });
      }
      return base;
    }

    function updateSummaryCards() {
      var filtered = getFilteredByTime();

      // Totals
      var redCount = 0, orangeCount = 0, totalSev = 0, sevCount = 0;
      var countries = {};
      var types = {conflict: 0, outbreak: 0, food: 0, hazard: 0, complex: 0};

      filtered.forEach(function(c) {
        var stance = (c.stance || '').toLowerCase();
        if (stance === 'red') redCount++;
        if (stance === 'orange') orangeCount++;
        if (c.severity && c.severity > 0) { totalSev += c.severity; sevCount++; }
        if (c.country) countries[IRC.normalizeCountry(c.country)] = true;
        if (c.type && types[c.type] !== undefined) types[c.type]++;
      });

      document.getElementById('total-count').textContent = IRC.formatNum(filtered.length);

    // Country filter state
    var countryFilter = 'all';

    // Helper function to render classifications with current filters and sort
    function renderRecent() {
      var stanceFilter = document.querySelector('.stance-pill.active').getAttribute('data-stance');
      var typeFilter = document.querySelector('.type-filter-btn.active').getAttribute('data-type');
      var sortBy = document.getElementById('sort-select').value;

      // Deduplicate: show only latest reclassification per classification_id
      var deduplicated = getLatestPerClassification(classifications);
      var reclassCounts = getReclassCounts();

      // Apply status, stance, type, country filters on deduplicated set
      var filtered = deduplicated.filter(function(c) {
        // Status filter (active/expired/expiring/all)
        if (statusFilter === 'active' && IRC.isExpired(c.expirationDate)) return false;
        if (statusFilter === 'expired' && !IRC.isExpired(c.expirationDate)) return false;
        if (statusFilter === 'expiring') {
          var _days = IRC.daysUntilExpiration(c.expirationDate);
          if (_days === null || _days < 0 || _days > 7) return false;
        }
        var stanceMatch = stanceFilter === 'all' || c.stance === stanceFilter;
        var typeMatch = typeFilter === 'all' || c.type === typeFilter;
        var countryMatch = countryFilter === 'all' || c.country === countryFilter;
        return stanceMatch && typeMatch && countryMatch;
      });

      // Sort data
      filtered.sort(function(a, b) {
        var dateA = new Date(a.date || 0);
        var dateB = new Date(b.date || 0);
        if (sortBy === 'newest') {
          return dateB - dateA;
        } else if (sortBy === 'oldest') {
          return dateA - dateB;
        } else if (sortBy === 'severity-high') {
          var sevA = a.severity || 0;
          var sevB = b.severity || 0;
          return sevB - sevA;
        } else if (sortBy === 'country') {
          var countryA = (a.country || '').toLowerCase();
          var countryB = (b.country || '').toLowerCase();
          return countryA.localeCompare(countryB);
        }
      });

      // Render cards
      var recentList = document.getElementById('recent-list');
      if (filtered.length === 0) {
        recentList.innerHTML = '<div class="empty-state">No classifications match your filters.</div>';
      } else {
        var html = '';
        filtered.forEach(function(c) {
          var stanceColor = IRC.STANCE_COLORS[c.stance] || '#E9E9E9';
          var typeIcon = typeIcons[c.type] || '';
          var sevVal = (c.severity !== null && c.severity !== undefined) ? c.severity : null;
          var date = IRC.formatDate(c.date);
          var classificationId = c.classificationId || c.id;
          var classificationCode = c.classificationId || c.code || '';
          var totalReclass = reclassCounts[classificationId] || 1;

          // Stance+severity combined pill
          var stanceLabel = c.stance ? c.stance.charAt(0).toUpperCase() + c.stance.slice(1) : 'White';
          var sevDisplay = sevVal !== null ? stanceLabel + ' ' + sevVal : stanceLabel;
          var isRed = c.stance === 'red';
          var stancePillStyle = 'background:' + stanceColor + ';color:' + (isRed ? '#fff' : '#000') + ';';

          // Expiry
          var daysLeft = IRC.daysUntilExpiration(c.expirationDate);
          var expiryTag = '';
          if (daysLeft !== null) {
            if (daysLeft < 0) expiryTag = '<span class="expiry-expired">EXPIRED</span>';
            else if (daysLeft <= 7) expiryTag = '<span class="expiry-warning">' + daysLeft + 'd left</span>';
          }

          // Reclassification badge (only if more than 1 entry exists)
          var reclassBadge = '';
          if (totalReclass > 1) {
            reclassBadge = '<span class="reclass-count-badge" title="Click to see reclassification history">' + totalReclass + ' reclassifications</span>';
          }

          // Build concise title from country + type
          var typeLabel = IRC.TYPE_LABELS[c.type] || c.type || '';
          var country = c.country || 'Unknown';
          var cardTitle = country + (typeLabel ? ' — ' + typeLabel : '');

          var description = c.emergencyName || '';

          // Card is clickable: if multiple reclassifications, show modal; otherwise navigate
          var cardTag, cardClose;
          if (totalReclass > 1) {
            cardTag = '<div class="classification-card" role="button" tabindex="0" data-classification-id="' + classificationId + '" style="border-left: 6px solid ' + stanceColor + '; cursor: pointer;">';
            cardClose = '</div>';
          } else {
            cardTag = '<a href="classify.html?view=' + encodeURIComponent(c.id) + '" class="classification-card" style="border-left: 6px solid ' + stanceColor + ';">';
            cardClose = '</a>';
          }

          html += cardTag +
            '<div class="card-content">' +
              '<div class="card-header-row">' +
                '<h3 class="card-title">' + cardTitle + '</h3>' +
                reclassBadge +
              '</div>' +
              (description ? '<p class="card-description">' + description + '</p>' : '') +
              '<div class="card-subline">' +
                '<span class="card-date">' + date + '</span>' +
                (totalReclass > 1 ? '<span class="card-separator">·</span><span class="card-reclass-info">Latest of ' + totalReclass + '</span>' : '') +
              '</div>' +
              '<div class="card-metadata">' +
                '<span class="stance-severity-pill" style="' + stancePillStyle + '">' + sevDisplay + '</span>' +
                '<div class="card-type-icon">' + typeIcon + '</div>' +
                (classificationCode ? '<span class="meta-pill meta-code">' + classificationCode + '</span>' : '') +
                expiryTag +
              '</div>' +
            '</div>' +
          cardClose;
        });
        recentList.innerHTML = html;

        // Attach click handlers for cards with reclassification history
        recentList.querySelectorAll('.classification-card[data-classification-id]').forEach(function(card) {
          card.addEventListener('click', function() {
            openReclassModal(this.getAttribute('data-classification-id'));
          });
          card.addEventListener('keydown', function(e) {
            if (e.key === 'Enter' || e.key === ' ') {
              e.preventDefault();
              openReclassModal(this.getAttribute('data-classification-id'));
            }
          });
        });
      }
    }

    // ── Reclassification Timeline Modal ──
    function openReclassModal(classificationId) {
      var group = getReclassGroup(classificationId);
      if (group.length === 0) return;

      var latest = group[group.length - 1];
      var country = latest.country || 'Unknown';
      var typeLabel = IRC.TYPE_LABELS[latest.type] || latest.type || '';
      var modalTitle = country + (typeLabel ? ' — ' + typeLabel : '');

      document.getElementById('reclass-modal-title').textContent = modalTitle;

      // Build progression summary
      var progHtml = '<div class="reclass-progression">';
      group.forEach(function(c, i) {
        var stance = c.stance ? c.stance.charAt(0).toUpperCase() + c.stance.slice(1) : 'White';
        var sev = (c.severity !== null && c.severity !== undefined) ? ' ' + c.severity : '';
        var color = IRC.STANCE_COLORS[c.stance] || '#E9E9E9';
        var isRed = c.stance === 'red';
        progHtml += '<span class="reclass-step-badge" style="background:' + color + ';color:' + (isRed ? '#fff' : '#000') + ';">' + stance + sev + '</span>';
        if (i < group.length - 1) progHtml += '<span class="prog-arrow">&#8594;</span>';
      });
      progHtml += '</div>';

      // Build timeline
      var timelineHtml = '<ol class="reclass-timeline">';
      group.forEach(function(c, i) {
        var stance = c.stance ? c.stance.charAt(0).toUpperCase() + c.stance.slice(1) : 'White';
        var sev = (c.severity !== null && c.severity !== undefined) ? ' ' + c.severity : '';
        var color = IRC.STANCE_COLORS[c.stance] || '#E9E9E9';
        var isRed = c.stance === 'red';
        var date = IRC.formatDate(c.date);
        var desc = c.emergencyName || '';
        var label = (c.reclassificationNumber || 1) <= 1 ? 'Initial Classification' : 'Reclassification #' + (c.reclassificationNumber || (i + 1));

        timelineHtml += '<li class="reclass-step">' +
          '<div class="reclass-step-dot" style="background:' + color + ';"></div>' +
          '<div class="reclass-step-header">' +
            '<span class="reclass-step-date">' + date + '</span>' +
            '<span class="reclass-step-badge" style="background:' + color + ';color:' + (isRed ? '#fff' : '#000') + ';">' + stance + sev + '</span>' +
            '<span class="reclass-step-label">' + label + '</span>' +
          '</div>' +
          (desc ? '<div class="reclass-step-desc">' + desc + '</div>' : '') +
          '<a class="reclass-step-link" href="classify.html?view=' + encodeURIComponent(c.id) + '">View full details &rarr;</a>' +
        '</li>';
      });
      timelineHtml += '</ol>';

      document.getElementById('reclass-modal-body').innerHTML = progHtml + timelineHtml;

      var overlay = document.getElementById('reclass-modal-overlay');
      overlay.style.display = 'flex';
    }

    function closeReclassModal() {
      document.getElementById('reclass-modal-overlay').style.display = 'none';
    }

    document.getElementById('reclass-modal-close').addEventListener('click', closeReclassModal);
    document.getElementById('reclass-modal-overlay').addEventListener('click', function(e) {
      if (e.target === this) closeReclassModal();
    });
    document.addEventListener('keydown', function(e) {
      if (e.key === 'Escape') closeReclassModal();
    });

    // Initial render
    renderRecent();

    // Event handlers for status pills
    document.querySelectorAll('.status-pill').forEach(function(btn) {
      btn.addEventListener('click', function() {
        document.querySelectorAll('.status-pill').forEach(function(b) { b.classList.remove('active'); });
        this.classList.add('active');
        statusFilter = this.getAttribute('data-status');
        renderRecent();
      });
    });

    // Event handlers for stance pills
    document.querySelectorAll('.stance-pill').forEach(function(btn) {
      btn.addEventListener('click', function() {
        document.querySelectorAll('.stance-pill').forEach(function(b) {
          b.classList.remove('active');
        });
        this.classList.add('active');
        renderRecent();
      });
    });

    // Event handlers for type filter icons
    document.querySelectorAll('.type-filter-btn').forEach(function(btn) {
      btn.addEventListener('click', function() {
        document.querySelectorAll('.type-filter-btn').forEach(function(b) {
          b.classList.remove('active');
        });
        this.classList.add('active');
        renderRecent();
      });
    });

    // Event handler for sort
    document.getElementById('sort-select').addEventListener('change', function() {
      renderRecent();
    });

    // ── Country search dropdown ──
    (function() {
      var input = document.getElementById('country-search-input');
      var dropdown = document.getElementById('country-search-dropdown');

      // Build unique country list from actual classification data
      var countrySet = {};
      classifications.forEach(function(c) {
        if (c.country) countrySet[c.country] = true;
      });
      var countryList = Object.keys(countrySet).sort();

      function showDropdown(filterText) {
        var lower = (filterText || '').toLowerCase();
        var matches = [];
        if (!lower) {
          // Show "All countries" + full list
          matches = countryList.slice();
        } else {
          matches = countryList.filter(function(name) {
            return name.toLowerCase().indexOf(lower) !== -1;
          });
        }

        var html = '<div class="country-search-option' + (countryFilter === 'all' ? ' selected' : '') + '" data-value="all">All countries</div>';
        matches.forEach(function(name) {
          html += '<div class="country-search-option' + (countryFilter === name ? ' selected' : '') + '" data-value="' + name.replace(/"/g, '&quot;') + '">' + name + '</div>';
        });

        dropdown.innerHTML = html;
        dropdown.style.display = 'block';

        // Attach click handlers
        dropdown.querySelectorAll('.country-search-option').forEach(function(opt) {
          opt.addEventListener('mousedown', function(e) {
            e.preventDefault(); // Prevent input blur
            var val = this.getAttribute('data-value');
            countryFilter = val;
            input.value = val === 'all' ? '' : val;
            dropdown.style.display = 'none';
            renderRecent();
          });
        });
      }

      input.addEventListener('focus', function() {
        showDropdown(this.value);
      });

      var countryDebounceTimer;
      input.addEventListener('input', function() {
        var self = this;
        clearTimeout(countryDebounceTimer);
        countryDebounceTimer = setTimeout(function() {
          if (!self.value) {
            countryFilter = 'all';
            renderRecent();
          }
          showDropdown(self.value);
        }, 200);
      });

      input.addEventListener('blur', function() {
        // Small delay to allow click on dropdown option
        setTimeout(function() {
          dropdown.style.display = 'none';
        }, 150);
      });

      // Allow clearing with Escape
      input.addEventListener('keydown', function(e) {
        if (e.key === 'Escape') {
          this.value = '';
          countryFilter = 'all';
          dropdown.style.display = 'none';
          renderRecent();
          this.blur();
        }
      });
    })();

    // ── 2D: Classification Map ──
    (function() {
      var map = null;
      var geoLayer = null;
      var geoData = null;

      // Map from geojson country names to classification country names
      var GEO_TO_CLASS = {
        'Republic of the Congo': 'Congo',
        'United Republic of Tanzania': 'Tanzania',
        'eSwatini': 'Eswatini',
        'Côte d\'Ivoire': 'Ivory Coast',
        'Republic of Serbia': 'Serbia',
        'The Bahamas': 'Bahamas',
        'Somaliland': 'Somalia',
        'Republic of Korea': 'South Korea',
        'Dem. Rep. Korea': 'North Korea',
        'Timor-Leste': 'East Timor',
        'Lao PDR': 'Laos',
        // Classification data uses formal names — map geojson short names
        'Iran': 'Iran (Islamic Republic of)',
        'Syria': 'Syrian Arab Republic',
        'Palestine': 'State of Palestine',
        'Moldova': 'Moldova (Republic of)',
        'Venezuela': 'Venezuela (Bolivarian Republic of)',
        'Vietnam': 'Viet Nam',
        'Tanzania': 'United Republic of Tanzania',
        'Democratic Republic of the Congo': 'Democratic Republic of the Congo'
      };

      // Reverse: classification names → geojson names
      var CLASS_TO_GEO = {};
      Object.keys(GEO_TO_CLASS).forEach(function(k) { CLASS_TO_GEO[GEO_TO_CLASS[k]] = k; });

      function getCountryClassifications() {
        var latest = getLatestPerClassification(classifications);
        // Read current filters (same ones the card list uses)
        var stanceFilter = document.querySelector('.stance-pill.active').getAttribute('data-stance');
        var typeFilter = document.querySelector('.type-filter-btn.active').getAttribute('data-type');

        var byCountry = {};
        latest.forEach(function(c) {
          if (!c.country) return;
          // Apply status filter (active/expired/expiring/all) — same as card list
          if (statusFilter === 'active' && IRC.isExpired(c.expirationDate)) return;
          if (statusFilter === 'expired' && !IRC.isExpired(c.expirationDate)) return;
          if (statusFilter === 'expiring') {
            var _d = IRC.daysUntilExpiration(c.expirationDate);
            if (_d === null || _d < 0 || _d > 7) return;
          }
          // Apply stance filter
          if (stanceFilter !== 'all' && c.stance !== stanceFilter) return;
          // Apply type filter
          if (typeFilter !== 'all' && c.type !== typeFilter) return;
          // Apply country filter
          if (countryFilter !== 'all' && c.country !== countryFilter) return;
          // Skip white stance on map (invisible anyway)
          if ((c.stance || '').toLowerCase() === 'white') return;

          var name = IRC.normalizeCountry(c.country);
          if (!byCountry[name]) byCountry[name] = [];
          byCountry[name].push(c);
        });
        return byCountry;
      }

      function getHighestStance(items) {
        var order = { red: 3, orange: 2, yellow: 1, white: 0 };
        var highest = 'white';
        items.forEach(function(c) {
          var s = (c.stance || 'white').toLowerCase();
          if ((order[s] || 0) > (order[highest] || 0)) highest = s;
        });
        return highest;
      }

      function stanceColor(stance) {
        return IRC.STANCE_COLORS[stance] || '#E9E9E9';
      }

      function matchGeoToClassification(geoName, byCountry) {
        // Direct match
        if (byCountry[geoName]) return byCountry[geoName];
        // Try alias mapping
        var aliasName = GEO_TO_CLASS[geoName];
        if (aliasName && byCountry[aliasName]) return byCountry[aliasName];
        // Try case-insensitive exact match, then substring match
        var lowerGeo = geoName.toLowerCase();
        var keys = Object.keys(byCountry);
        for (var i = 0; i < keys.length; i++) {
          if (keys[i].toLowerCase() === lowerGeo) return byCountry[keys[i]];
        }
        // Substring: "Iran" matches "Iran (Islamic Republic of)"
        for (var j = 0; j < keys.length; j++) {
          if (keys[j].toLowerCase().indexOf(lowerGeo) === 0) return byCountry[keys[j]];
        }
        return null;
      }

      function buildPopup(countryName, items) {
        var html = '<div class="map-popup-title">' + countryName + '</div>';
        items.forEach(function(c, idx) {
          if (idx > 0) html += '<div class="map-popup-multi"></div>';
          var stance = c.stance ? c.stance.charAt(0).toUpperCase() + c.stance.slice(1) : 'White';
          var color = stanceColor(c.stance);
          var isRed = c.stance === 'red';
          var sev = (c.severity !== null && c.severity !== undefined) ? ' ' + c.severity : '';
          html += '<span class="map-popup-stance" style="background:' + color + ';color:' + (isRed ? '#fff' : '#000') + ';">' + stance + sev + '</span>';
          if (c.emergencyName) html += '<div class="map-popup-detail">' + c.emergencyName + '</div>';
          if (c.type) html += '<div class="map-popup-detail">Type: ' + (IRC.TYPE_LABELS[c.type] || c.type) + '</div>';
          if (c.date) html += '<div class="map-popup-detail">Date: ' + IRC.formatDate(c.date) + '</div>';
          var daysLeft = IRC.daysUntilExpiration(c.expirationDate);
          if (daysLeft !== null) {
            if (daysLeft < 0) html += '<div class="map-popup-detail" style="color:#E52911;">Expired</div>';
            else if (daysLeft <= 7) html += '<div class="map-popup-detail" style="color:#F58220;">' + daysLeft + ' days until expiry</div>';
          }
          html += '<a class="map-popup-link" href="classify.html?view=' + encodeURIComponent(c.id) + '">View details &rarr;</a>';
        });
        return html;
      }

      function initMap() {
        if (map) return;
        map = L.map('classification-map', {
          center: [15, 20],
          zoom: 2,
          minZoom: 2,
          maxZoom: 7,
          worldCopyJump: true,
          zoomControl: true,
          attributionControl: false
        });

        // Light grey basemap tiles
        L.tileLayer('https://{s}.basemaps.cartocdn.com/light_nolabels/{z}/{x}/{y}{r}.png', {
          subdomains: 'abcd',
          maxZoom: 19
        }).addTo(map);

        // Add labels on top (separate layer so country fills are visible)
        L.tileLayer('https://{s}.basemaps.cartocdn.com/light_only_labels/{z}/{x}/{y}{r}.png', {
          subdomains: 'abcd',
          maxZoom: 19,
          pane: 'overlayPane'
        }).addTo(map);

        loadGeoData();
      }

      function loadGeoData() {
        fetch('countries-simplified.json')
          .then(function(res) { return res.json(); })
          .then(function(data) {
            geoData = data;
            renderMapLayer();
          })
          .catch(function(err) {
            console.warn('Failed to load map data:', err);
            document.getElementById('classification-map').innerHTML =
              '<div style="display:flex;align-items:center;justify-content:center;height:100%;color:#666;font-size:0.9rem;">Map data unavailable</div>';
          });
      }

      function renderMapLayer() {
        if (!map || !geoData) return;
        if (geoLayer) map.removeLayer(geoLayer);

        var byCountry = getCountryClassifications();

        geoLayer = L.geoJSON(geoData, {
          style: function(feature) {
            var name = feature.properties.name;
            var items = matchGeoToClassification(name, byCountry);
            var stance = items ? getHighestStance(items) : null;
            var fillColor = stance ? stanceColor(stance) : '#f0f0f0';
            var fillOpacity = stance ? 0.7 : 0.15;
            return {
              fillColor: fillColor,
              fillOpacity: fillOpacity,
              color: '#999',
              weight: 0.5,
              opacity: 0.6
            };
          },
          onEachFeature: function(feature, layer) {
            var name = feature.properties.name;
            var items = matchGeoToClassification(name, byCountry);
            if (items) {
              var displayName = items[0].country || name;
              layer.bindPopup(buildPopup(displayName, items), { maxWidth: 280, className: 'map-classification-popup' });
              layer.on('mouseover', function(e) {
                this.setStyle({ weight: 2, color: '#333', fillOpacity: 0.85 });
                this.bringToFront();
              });
              layer.on('mouseout', function(e) {
                geoLayer.resetStyle(this);
              });
              layer.on('click', function(e) {
                // Also filter the list below to this country
                countryFilter = displayName;
                document.getElementById('country-search-input').value = displayName;
                renderRecent();
              });
            }
          }
        }).addTo(map);
      }

      // Re-render map when classifications refresh or filters change
      var origUpdateSummary = updateSummaryCards;
      updateSummaryCards = function() {
        origUpdateSummary();
        if (map && geoData) renderMapLayer();
      };
      var origRenderRecent = renderRecent;
      renderRecent = function() {
        origRenderRecent();
        if (map && geoData) renderMapLayer();
      };

      // Map/List toggle
      document.querySelectorAll('.map-toggle-btn').forEach(function(btn) {
        btn.addEventListener('click', function() {
          document.querySelectorAll('.map-toggle-btn').forEach(function(b) { b.classList.remove('active'); });
          this.classList.add('active');
          var view = this.getAttribute('data-view');
          var mapEl = document.getElementById('classification-map');
          var legendEl = document.getElementById('map-legend');
          var recentEl = document.querySelector('.recent-section');

          if (view === 'map') {
            mapEl.style.display = 'block';
            legendEl.style.display = 'flex';
            if (map) map.invalidateSize();
          } else {
            mapEl.style.display = 'none';
            legendEl.style.display = 'none';
          }
        });
      });

      // Initialize map on load
      initMap();
    })();

  </script>
  <script src="albert-panel.js"></script>
</body>
</html>
